                                  <td style={{padding:"10px 14px",fontSize:"12px",color:"var(--text2)",maxWidth:"150px"}}>{c.dirigido_a?c.dirigido_a.slice(0,40)+(c.dirigido_a.length>40?"…":""):"—"}</td>
                                  <td style={{padding:"10px 14px"}}>
                                    <span style={{fontSize:"11px",fontWeight:"600",padding:"3px 10px",borderRadius:"20px",
                                      background:estadoBg[c.estado],color:estadoColor[c.estado],whiteSpace:"nowrap"}}>
                                      {c.estado}
                                    </span>
                                  </td>
                                  <td style={{padding:"10px 14px",fontSize:"12px"}}>
                                    {pctAsist!==null ? (
                                      <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                                        <div style={{width:"40px",height:"4px",background:"var(--surface2)",borderRadius:"2px",overflow:"hidden"}}>
                                          <div style={{height:"100%",width:`${pctAsist}%`,background:"var(--accent)",borderRadius:"2px"}}/>
                                        </div>
                                        <span style={{color:"var(--text2)"}}>{c.trabajadores_asistieron}/{c.trabajadores_programados}</span>
                                      </div>
                                    ) : "—"}
                                  </td>
                                  <td style={{padding:"10px 14px"}}>
                                    <div style={{display:"flex",gap:"4px"}}>
                                      <button type="button" onClick={()=>setEditing(c)} style={{background:"none",color:"var(--text2)",padding:"4px 6px",borderRadius:"6px",border:"0.5px solid var(--border)",cursor:"pointer"}}>{Ico.edit}</button>
                                      {isAdmin && <button type="button" onClick={()=>deleteOne(c.id)} style={{background:"none",color:"var(--danger)",padding:"4px 6px",borderRadius:"6px",border:"0.5px solid #fca5a5",cursor:"pointer"}}>{Ico.trash}</button>}
                                    </div>
                                  </td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      ))}

      {filtered.length===0 && (
        <div className="empty-state">No se encontraron capacitaciones con estos filtros.</div>
      )}

      {(creating||editing) && (
        <CapForm
          cap={editing}
          empresas={empresas}
          token={token}
          onSave={()=>{ setCreating(false); setEditing(null); onRefresh(); }}
          onClose={()=>{ setCreating(false); setEditing(null); }}
        />
      )}
    </div>
  );
}

function Empresas({ empresas, token, onRefresh }) {
  const [editing, setEditing] = React.useState(null);
  const [creating, setCreating] = React.useState(false);
  const [nombre, setNombre] = React.useState("");
  const [codigo, setCodigo] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [err, setErr] = React.useState("");

  const openEdit = (emp) => { setEditing(emp); setNombre(emp.nombre); setCodigo(emp.codigo||""); setErr(""); };
  const openCreate = () => { setCreating(true); setNombre(""); setCodigo(""); setErr(""); };
  const close = () => { setEditing(null); setCreating(false); setErr(""); };

  const save = async () => {
    if(!nombre.trim()) { setErr("El nombre es obligatorio."); return; }
    setLoading(true); setErr("");
    try {
      if(creating) {
        await api("empresas",{method:"POST",body:JSON.stringify({nombre:nombre.trim(),codigo:codigo.trim().toUpperCase()})},token);
      } else {
        await api(`empresas?id=eq.${editing.id}`,{method:"PATCH",body:JSON.stringify({nombre:nombre.trim(),codigo:codigo.trim().toUpperCase()})},token);
      }
      onRefresh(); close();
    } catch(e) { setErr(e.message); }
    finally { setLoading(false); }
  };

  return (
    <div className="page">
      <div className="page-header" style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"12px"}}>
        <div>
          <h2 style={{fontSize:"24px",fontWeight:"700"}}>Empresas</h2>
          <p style={{color:"var(--text2)",marginTop:"4px"}}>Administra las empresas del plan de formación</p>
        </div>
        <button className="btn-primary" onClick={openCreate} style={{display:"flex",alignItems:"center",gap:"6px"}}>{Ico.plus} Nueva empresa</button>
      </div>
      <div className="card">
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>
            <th>Nombre</th><th>Código</th><th>Acción</th>
          </tr></thead>
          <tbody>
            {empresas.map(emp=>(
              <tr key={emp.id}>
                <td style={{fontWeight:"500"}}>{emp.nombre}</td>
                <td><span style={{fontSize:"12px",background:"var(--accent-light)",color:"var(--accent)",padding:"2px 10px",borderRadius:"20px",fontWeight:"600"}}>{emp.codigo||"—"}</span></td>
                <td><button type="button" onClick={()=>openEdit(emp)} style={{background:"none",color:"var(--text2)",padding:"4px 8px",borderRadius:"6px",border:"1px solid var(--border)",fontSize:"13px",cursor:"pointer",display:"flex",alignItems:"center",gap:"5px"}}>{Ico.edit} Editar</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {(editing||creating) && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&close()}>
          <div className="modal" style={{maxWidth:"420px"}}>
            <div className="modal-header">
              <h3 style={{fontSize:"18px",fontWeight:"700"}}>{creating?"Nueva empresa":"Editar empresa"}</h3>
              <button onClick={close} style={{background:"none",color:"var(--text2)",padding:"4px"}}>{Ico.close}</button>
            </div>
            <div className="modal-body">
              {err && <div className="alert alert-err">{err}</div>}
              <div className="field"><label className="label">Nombre de la empresa *</label><input value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Ej: Química Orión SAS"/></div>
              <div className="field"><label className="label">Código (siglas)</label><input value={codigo} onChange={e=>setCodigo(e.target.value)} placeholder="Ej: QO" style={{textTransform:"uppercase"}}/></div>
            </div>
            <div className="modal-footer">
              <button className="btn-ghost" onClick={close}>Cancelar</button>
              <button className="btn-primary" onClick={save} disabled={loading}>{loading?"Guardando…":"Guardar"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


// ── MÓDULO BIBLIOTECA ──
function ModuloBiblioteca({ token, isAdmin, onBack, onLogout }) {
  const { useState, useEffect } = React;
  const [vista, setVista] = useState("dashboard");
  const [filtroVencidos, setFiltroVencidos] = useState(false);
  const [libros, setLibros] = useState([]);
  const [prestamos, setPrestamos] = useState([]);
  const [loading, setLoading] = useState(false);
  const [modalLibro, setModalLibro] = useState(null);
  const [modalPrestamo, setModalPrestamo] = useState(null);
  const [editLibro, setEditLibro] = useState(null);
  const [search, setSearch] = useState("");
  const [filtroEst, setFiltroEst] = useState("");

  const CATEGORIAS_DEWEY = ["000 - 099 Generalidades y Conocimiento", "100 - 199 Filosofía y Psicología", "200 – 299 Religión", "300 – 399 Ciencias Sociales", "400 – 499 Lenguas", "500 – 599 Ciencias Naturales y Matemáticas", "600 – 699Tecnología / Ciencias Aplicadas", "700 - 799 Artes, Bellas Artes y Recreación", "800 – 899 Literatura", "900 – 999 Historia y Geografía", "RANGO 860 - 869 LITERATURA LATINOAMERICANA", "Literatura Infantil y su Clasificación"];
  const EMPRESAS = ["QUÍMICA ORIÓN S.A.S","LOGÍSTICA INTEGRAL ALTAIRR S.A.S","MAXPURE S.A.S","FIXNOVA S.A.S"];

  const apiB = async (path, opts={}) => {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, "Content-Type": "application/json", Prefer: opts.prefer||"return=representation", ...(opts.headers||{}) },
      ...opts
    });
    if(!res.ok){ const t=await res.text(); throw new Error(t); }
    const t = await res.text(); return t ? JSON.parse(t) : null;
  };

  const [empleados, setEmpleados] = useState([]);

  const cargar = async () => {
    setLoading(true);
    try {
      const [libs, prests, emps] = await Promise.all([
        apiB("libros?select=*&order=titulo,descripcion_dewey"),
        apiB("prestamos?select=*&order=created_at.desc"),
        apiB("empleados?select=*&order=nombre")
      ]);
      setLibros(libs||[]);
      setPrestamos(prests||[]);
      setEmpleados(emps||[]);
    } catch(e){ console.error(e); }
    setLoading(false);
  };

  useEffect(()=>{ cargar(); },[]);

  // Calcular disponibles por libro
  const disponibles = (libroId) => {
    const lib = libros.find(l=>l.id===libroId);
    if(!lib) return 0;
    const prestados = prestamos.filter(p=>p.libro_id===libroId && p.estado==="Prestado").length;
    return lib.total_ejemplares - prestados;
  };

  const totalDisponibles = libros.reduce((acc,l)=> acc + disponibles(l.id), 0);
  const totalPrestados = prestamos.filter(p=>p.estado==="Prestado").length;
  const vencidos = prestamos.filter(p=>p.estado==="Prestado" && p.fecha_devolucion_esperada && new Date(p.fecha_devolucion_esperada) < new Date()).length;

  const librosFiltrados = libros.filter(l=>{
    const s = search.toLowerCase();
    return !s || l.titulo?.toLowerCase().includes(s) || l.autor?.toLowerCase().includes(s) || l.categoria?.toLowerCase().includes(s);
  });

  // Reset filtroVencidos when vista changes away from prestamos
  React.useEffect(()=>{ if(vista!=="prestamos") setFiltroVencidos(false); },[vista]);

  const prestamosFiltrados = prestamos.filter(p=>{
    const s = search.toLowerCase();
    const matchSearch = !s || p.nombre_lector?.toLowerCase().includes(s);
    const matchEst = !filtroEst || p.estado === filtroEst;
    const matchVencido = !filtroVencidos || (p.estado==="Prestado" && p.fecha_devolucion_esperada && new Date(p.fecha_devolucion_esperada) < new Date());
    return matchSearch && matchEst && matchVencido;
  });

  return (
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{background:"var(--surface)",borderBottom:"0.5px solid var(--border)",padding:"14px 28px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:"14px"}}>
          <button type="button" onClick={onBack} style={{background:"none",border:"0.5px solid var(--border)",borderRadius:"8px",padding:"6px 12px",fontSize:"12px",color:"var(--text2)",cursor:"pointer",display:"flex",alignItems:"center",gap:"5px"}}>
            <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
            Módulos
          </button>
          <div>
            <div style={{fontFamily:"Fraunces,serif",fontSize:"18px",fontWeight:"700",color:"var(--text)"}}>Biblioteca Orión</div>
            <div style={{fontSize:"11px",color:"var(--text3)"}}>Gestión de libros y préstamos</div>
          </div>
        </div>
        <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
          {[{id:"dashboard",label:"Inicio"},{id:"libros",label:"Libros"},{id:"prestamos",label:"Préstamos"},{id:"empleados",label:"Empleados"}].map(v=>(
            <button key={v.id} type="button" onClick={()=>setVista(v.id)} style={{padding:"6px 14px",borderRadius:"7px",fontSize:"13px",cursor:"pointer",border:"0.5px solid",fontWeight:vista===v.id?"600":"400",
              borderColor:vista===v.id?"#c9a84c":"var(--border)",background:vista===v.id?"#fdf9f0":"var(--surface)",color:vista===v.id?"#a8893a":"var(--text2)"}}>
              {v.label}

          <button type="button" onClick={onLogout} style={{background:"none",border:"0.5px solid var(--border)",borderRadius:"8px",padding:"6px 12px",fontSize:"12px",color:"var(--text3)",cursor:"pointer",marginLeft:"8px"}}>Salir</button>

                {num:totalPrestados, label:"Actualmente prestados", color:"#3b5bdb", action:()=>{setFiltroVencidos(false);setVista("prestamos");}},
                {num:vencidos, label:"Préstamos vencidos", color:vencidos>0?"#dc2626":"var(--text3)", action:()=>{setFiltroVencidos(true);setVista("prestamos");}},
              ].map((s,i)=>(
                <div key={i} className="stat-card" onClick={s.action} style={{cursor:s.action?"pointer":"default",transition:"transform 0.12s"}}

                  onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)"}}>

                  <div className="stat-label">{s.label}{s.action&&<span style={{fontSize:"10px",color:"var(--text3)",marginLeft:"4px"}}>→</span>}</div>
                </div>
              ))}
            </div>

            {/* Préstamos activos */}
            <div className="card" style={{padding:"20px",marginBottom:"20px"}}>
              <div style={{fontSize:"11px",fontWeight:"600",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"14px"}}>Préstamos activos</div>
              {(()=>{
                const vencidosList = prestamos.filter(p=>p.estado==="Prestado" && p.fecha_devolucion_esperada && new Date(p.fecha_devolucion_esperada) < new Date());
                if(vencidosList.length===0) return null;
                return (

                    {vencidosList.map(p=>{
                      const lib = libros.find(l=>l.id===p.libro_id);

                      const msg = encodeURIComponent('Hola '+p.nombre_lector+', te recordamos que el libro: '+(lib&&lib.titulo?lib.titulo:'')+'. Fecha prestamo: '+p.fecha_prestamo+'. Vencio el: '+p.fecha_devolucion_esperada+'. Por favor contactanos para coordinar la devolucion. Gracias.');

                      return (

                              WhatsApp
                            </a>}
                            {mailLink && <a href={mailLink} style={{fontSize:"11px",padding:"5px 12px",borderRadius:"6px",background:"#3b5bdb",color:"white",textDecoration:"none",fontWeight:"600",display:"flex",alignItems:"center",gap:"4px"}}>
                              <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                              Correo
                            </a>}
                            <button type="button" onClick={()=>setModalPrestamo({...p,accion:"devolver"})} style={{fontSize:"11px",padding:"5px 12px",borderRadius:"6px",background:"#c9a84c",color:"#1a1714",border:"none",cursor:"pointer",fontWeight:"600"}}>Devolver</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })()}
              {prestamos.filter(p=>p.estado==="Prestado").length===0
                ? <div style={{color:"var(--text3)",fontSize:"13px",padding:"20px 0",textAlign:"center"}}>No hay préstamos activos.</div>
                : <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr>
                    {["Libro","Lector","Empresa","Fecha préstamo","Devolución esperada","Estado"].map(h=>(
                      <th key={h} style={{fontSize:"10px",fontWeight:"600",color:"var(--text3)",textAlign:"left",padding:"8px 12px",borderBottom:"0.5px solid var(--border)",textTransform:"uppercase",letterSpacing:"0.05em",whiteSpace:"nowrap"}}>{h}</th>

                      const vencido = p.estado==="Prestado" && p.fecha_devolucion_esperada && new Date(p.fecha_devolucion_esperada) < new Date();
                      return (
                        <tr key={p.id}>
                          <td style={{padding:"10px 12px",borderBottom:"0.5px solid var(--border)",fontSize:"13px",fontWeight:"500",whiteSpace:"nowrap"}}>{lib?.titulo||"—"}</td>
                          <td style={{padding:"10px 12px",borderBottom:"0.5px solid var(--border)",fontSize:"13px",whiteSpace:"nowrap"}}>{p.nombre_lector}</td>
                          <td style={{padding:"10px 12px",borderBottom:"0.5px solid var(--border)",fontSize:"12px",color:"var(--text2)"}}>{p.cedula||"—"}</td>
                          <td style={{padding:"10px 12px",borderBottom:"0.5px solid var(--border)",fontSize:"12px",color:"var(--text2)",whiteSpace:"nowrap"}}>{p.cargo||"—"}</td>
                          <td style={{padding:"10px 12px",borderBottom:"0.5px solid var(--border)",fontSize:"12px",color:"var(--text2)",whiteSpace:"nowrap"}}>{p.empresa||"—"}</td>
                          <td style={{padding:"10px 12px",borderBottom:"0.5px solid var(--border)"}}>
                            {(()=>{const emp=empleados.find(e=>e.cedula===p.cedula||e.nombre===p.nombre_lector); if(!emp) return <span style={{color:"var(--text3)",fontSize:"11px"}}>—</span>; return <span style={{fontSize:"11px",fontWeight:"600",padding:"2px 8px",borderRadius:"20px",background:emp.activo!==false?"#ecfdf5":"#fef2f2",color:emp.activo!==false?"#065f46":"#991b1b"}}>{emp.activo!==false?"Activo":"Inactivo"}</span>;})()}
                          </td>
                          <td style={{padding:"10px 12px",borderBottom:"0.5px solid var(--border)",fontSize:"12px",color:"var(--text2)"}}>{p.contacto||"—"}</td>
                          <td style={{padding:"10px 12px",borderBottom:"0.5px solid var(--border)",fontSize:"12px",whiteSpace:"nowrap"}}>{p.fecha_prestamo}</td>
                          <td style={{padding:"10px 12px",borderBottom:"0.5px solid var(--border)",fontSize:"12px",whiteSpace:"nowrap",color:vencido?"#dc2626":"var(--text2)",fontWeight:vencido?"600":"400"}}>{p.fecha_devolucion_esperada||"—"}{vencido?" ⚠️":""}</td>
                          <td style={{padding:"10px 12px",borderBottom:"0.5px solid var(--border)",fontSize:"12px",color:"var(--text2)",whiteSpace:"nowrap"}}>{p.fecha_devolucion_real||"—"}</td>
                          <td style={{padding:"10px 12px",borderBottom:"0.5px solid var(--border)"}}>
                            <span style={{fontSize:"11px",fontWeight:"600",padding:"2px 10px",borderRadius:"20px",whiteSpace:"nowrap",
                              background:p.estado==="Devuelto"?"#ecfdf5":vencido?"#fef2f2":"#eff6ff",
                              color:p.estado==="Devuelto"?"#065f46":vencido?"#991b1b":"#1e40af"}}>
                              {p.estado==="Devuelto"?"Devuelto":vencido?"Vencido":"Prestado"}
                            </span>
                          </td>
                          <td style={{padding:"10px 12px",borderBottom:"0.5px solid var(--border)"}}>
                            <button type="button" onClick={async()=>{ if(!confirm("¿Eliminar este préstamo?")) return; await apiB(`prestamos?id=eq.${p.id}`,{method:"DELETE",prefer:"return=minimal"}); cargar(); }} style={{background:"none",color:"var(--danger)",border:"0.5px solid var(--danger)",borderRadius:"6px",padding:"3px 8px",fontSize:"11px",cursor:"pointer"}}>Eliminar</button>
                          </td>
                        </tr>
                      );
                    })}
                    {prestamosFiltrados.length===0 && <tr><td colSpan="10" style={{textAlign:"center",padding:"30px",color:"var(--text3)",fontSize:"13px"}}>No hay préstamos registrados.</td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* MODAL LIBRO */}
      {editLibro && <FormLibro libro={editLibro} CATEGORIAS_DEWEY={CATEGORIAS_DEWEY} token={token} onSave={()=>{setEditLibro(null);cargar();}} onClose={()=>setEditLibro(null)} apiB={apiB}/>}

      {/* MODAL PRÉSTAMO */}
      {modalPrestamo && <FormPrestamo data={modalPrestamo} libros={libros} empleados={empleados} token={token} onSave={()=>{setModalPrestamo(null);cargar();}} onClose={()=>setModalPrestamo(null)} apiB={apiB}/>}
      {vista==="empleados" && <GestorEmpleados empleados={empleados} token={token} onRefresh={cargar} apiB={apiB}/>}
    </div>
  );
}

// ── FORM LIBRO ──
function FormLibro({ libro, CATEGORIAS_DEWEY, token, onSave, onClose, apiB }) {
  const isNew = !libro.id;
  const [form, setForm] = React.useState({
    categoria_dewey: libro.categoria_dewey||"",
    descripcion_dewey: libro.descripcion_dewey||"",
    titulo: libro.titulo||"",
    autor: libro.autor||"",
    genero: libro.genero||"",
    sinopsis: libro.sinopsis||"",
    valor: libro.valor||0,
    total_ejemplares: libro.total_ejemplares||1,
    observaciones: libro.observaciones||""
  });
  const [loading, setLoading] = React.useState(false);
  const [err, setErr] = React.useState("");
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const buscarEmpleado = (cedula) => {
    set("cedula", cedula);
    const emp = empleados.find(e=>e.cedula===cedula.trim());
    if(emp) {
      setForm(f=>({...f, cedula, nombre_lector:emp.nombre, cargo:emp.cargo||"", empresa:emp.empresa||"", contacto:emp.celular||emp.correo||""}));
    }
  };

  const save = async () => {
    if(!form.titulo.trim()){ setErr("El título es obligatorio."); return; }
    setLoading(true); setErr("");
    try {
      if(isNew) await apiB("libros", {method:"POST", body:JSON.stringify({...form, updated_at:new Date().toISOString()})});
      else await apiB(`libros?id=eq.${libro.id}`, {method:"PATCH", body:JSON.stringify({...form, updated_at:new Date().toISOString()})});
      onSave();
    } catch(e){ setErr(e.message); }
    setLoading(false);
  };

  const eliminar = async () => {
    if(!confirm("¿Eliminar este libro?")) return;
    await apiB(`libros?id=eq.${libro.id}`, {method:"DELETE", prefer:"return=minimal"});
    onSave();
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <h3 style={{fontSize:"18px",fontWeight:"700"}}>{isNew?"Nuevo libro":"Editar libro"}</h3>
          <button onClick={onClose} style={{background:"none",color:"var(--text2)",padding:"4px"}}>{Ico.close}</button>
        </div>
        <div className="modal-body">
          {err && <div className="alert alert-err">{err}</div>}
          <div className="field">
            <label className="label">Categoría Dewey</label>
            <select value={form.categoria_dewey} onChange={e=>set("categoria_dewey",e.target.value)}>
              <option value="">— Seleccionar categoría —</option>
              {CATEGORIAS_DEWEY.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div className="field">
            <label className="label">Nomenclatura Dewey (código)</label>
            <input value={form.descripcion_dewey} onChange={e=>set("descripcion_dewey",e.target.value)} placeholder="Ej: 001 HA, 658.3 Go, 152.1 Ri"/>
          </div>
          <div className="field"><label className="label">Título *</label><input value={form.titulo} onChange={e=>set("titulo",e.target.value)} placeholder="Título del libro"/></div>
          <div className="field"><label className="label">Autor</label><input value={form.autor} onChange={e=>set("autor",e.target.value)} placeholder="Nombre del autor"/></div>
          <div className="field"><label className="label">Género</label><input value={form.genero} onChange={e=>set("genero",e.target.value)} placeholder="Ej: Literatura, Autoayuda, Psicología…"/></div>
          <div className="field"><label className="label">Sinopsis</label><textarea value={form.sinopsis} onChange={e=>set("sinopsis",e.target.value)} rows={4} placeholder="Descripción o sinopsis del libro…"/></div>
          <div className="grid2">
            <div className="field"><label className="label">Valor ($)</label><input type="number" value={form.valor} onChange={e=>set("valor",parseFloat(e.target.value)||0)}/></div>
            <div className="field"><label className="label">Total ejemplares</label><input type="number" min="1" value={form.total_ejemplares} onChange={e=>set("total_ejemplares",parseInt(e.target.value)||1)}/></div>
          </div>
          <div className="field"><label className="label">Observaciones</label><textarea value={form.observaciones} onChange={e=>set("observaciones",e.target.value)} rows={2} placeholder="Observaciones adicionales…"/></div>
        </div>
        <div className="modal-footer">
          {!isNew && <button type="button" onClick={eliminar} style={{marginRight:"auto",background:"none",color:"var(--danger)",border:"0.5px solid var(--danger)",borderRadius:"8px",padding:"8px 14px",fontSize:"13px",cursor:"pointer"}}>Eliminar</button>}
          <button className="btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn-primary" onClick={save} disabled={loading}>{loading?"Guardando…":"Guardar"}</button>
        </div>
      </div>
    </div>
  );
}

// ── FORM PRÉSTAMO ──
function FormPrestamo({ data, libros, empleados=[], token, onSave, onClose, apiB }) {
  const isDevolucion = data.accion === "devolver";
  const [form, setForm] = React.useState({
    libro_id: data.libro_id||"",
    nombre_lector: data.nombre_lector||"",
    cedula: data.cedula||"",
    cargo: data.cargo||"",
    empresa: data.empresa||"",
    contacto: data.contacto||"",
    fecha_prestamo: data.fecha_prestamo||new Date().toISOString().slice(0,10),
    fecha_devolucion_esperada: data.fecha_devolucion_esperada||"",
    fecha_devolucion_real: new Date().toISOString().slice(0,10),
    observaciones: data.observaciones||""
  });
  const [loading, setLoading] = React.useState(false);
  const [err, setErr] = React.useState("");
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const buscarEmpleado = (cedula) => {
    set("cedula", cedula);
    const emp = empleados.find(e=>e.cedula===cedula.trim());
    if(emp) {
      setForm(f=>({...f, cedula, nombre_lector:emp.nombre, cargo:emp.cargo||"", empresa:emp.empresa||"", contacto:emp.celular||emp.correo||""}));
    }
  };

  const save = async () => {
    setLoading(true); setErr("");
    try {
      if(isDevolucion) {
        await apiB(`prestamos?id=eq.${data.id}`, {
          method:"PATCH",
          body:JSON.stringify({estado:"Devuelto", fecha_devolucion_real:form.fecha_devolucion_real, observaciones:form.observaciones})
        });
      } else {
        if(!form.libro_id||!form.nombre_lector){ setErr("Libro y lector son obligatorios."); setLoading(false); return; }
        await apiB("prestamos", {method:"POST", body:JSON.stringify({
          libro_id:form.libro_id, nombre_lector:form.nombre_lector,
          cedula:form.cedula, cargo:form.cargo, empresa:form.empresa,
          contacto:form.contacto, fecha_prestamo:form.fecha_prestamo,
          fecha_devolucion_esperada:form.fecha_devolucion_esperada||null,
          observaciones:form.observaciones, estado:"Prestado"
        })});
      }
      onSave();
    } catch(e){ setErr(e.message); }
    setLoading(false);
  };

  const lib = libros.find(l=>l.id===data.libro_id);

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <h3 style={{fontSize:"18px",fontWeight:"700"}}>{isDevolucion?"Registrar devolución":"Nuevo préstamo"}</h3>
          <button onClick={onClose} style={{background:"none",color:"var(--text2)",padding:"4px"}}>{Ico.close}</button>
        </div>
        <div className="modal-body">
          {err && <div className="alert alert-err">{err}</div>}
          {isDevolucion ? (
            <>
              <div style={{background:"var(--surface2)",borderRadius:"10px",padding:"14px",marginBottom:"16px"}}>
                <div style={{fontSize:"12px",color:"var(--text3)",marginBottom:"4px"}}>Libro</div>
                <div style={{fontSize:"15px",fontWeight:"600",color:"var(--text)"}}>{lib?.titulo}</div>
                <div style={{fontSize:"13px",color:"var(--text2)",marginTop:"2px"}}>Prestado a: {data.nombre_lector}</div>
              </div>
              <div className="field"><label className="label">Fecha de devolución real</label><input type="date" value={form.fecha_devolucion_real} onChange={e=>set("fecha_devolucion_real",e.target.value)}/></div>
              <div className="field"><label className="label">Observaciones</label><textarea value={form.observaciones} onChange={e=>set("observaciones",e.target.value)} rows={2}/></div>
            </>
          ) : (
            <>
              <div className="field"><label className="label">Libro *</label>
                <select value={form.libro_id} onChange={e=>set("libro_id",e.target.value)}>
                  <option value="">— Seleccionar libro —</option>
                  {libros.map(l=><option key={l.id} value={l.id}>{l.titulo}</option>)}
                </select>
              </div>
              <div className="field"><label className="label">Nombre del lector *</label><input value={form.nombre_lector} onChange={e=>set("nombre_lector",e.target.value)} placeholder="Nombre completo"/></div>
              <div className="grid2">
                <div className="field">
                <label className="label">Cédula</label>
                <input value={form.cedula} onChange={e=>buscarEmpleado(e.target.value)} placeholder="Ingresa la cédula para autocompletar"/>
                {(()=>{const emp=empleados.find(e=>e.cedula===form.cedula); if(!emp) return null; return <div style={{fontSize:"11px",marginTop:"4px",color:emp.activo!==false?"#059669":"#dc2626",fontWeight:"500"}}>{emp.activo!==false?"✓ Empleado encontrado · Activo":"⚠ Empleado encontrado · Inactivo (retirado)"}</div>; })()}
              </div>
                <div className="field"><label className="label">Cargo</label><input value={form.cargo} onChange={e=>set("cargo",e.target.value)}/></div>
              </div>
              <div className="grid2">
                <div className="field"><label className="label">Empresa</label>
            <select value={form.empresa} onChange={e=>set("empresa",e.target.value)}>
              <option value="">— Seleccionar empresa —</option>
              <option value="QUÍMICA ORIÓN S.A.S">QUÍMICA ORIÓN S.A.S</option>
              <option value="LOGÍSTICA INTEGRAL ALTAIRR S.A.S">LOGÍSTICA INTEGRAL ALTAIRR S.A.S</option>
              <option value="MAXPURE S.A.S">MAXPURE S.A.S</option>
              <option value="FIXNOVA S.A.S">FIXNOVA S.A.S</option>
            </select>
          </div>
                <div className="field"><label className="label">Correo o celular</label><input value={form.contacto} onChange={e=>set("contacto",e.target.value)}/></div>
              </div>
              <div className="grid2">
                <div className="field"><label className="label">Fecha de préstamo</label><input type="date" value={form.fecha_prestamo} onChange={e=>set("fecha_prestamo",e.target.value)}/></div>
                <div className="field"><label className="label">Fecha devolución esperada</label><input type="date" value={form.fecha_devolucion_esperada} onChange={e=>set("fecha_devolucion_esperada",e.target.value)}/></div>
              </div>
              <div className="field"><label className="label">Observaciones</label><textarea value={form.observaciones} onChange={e=>set("observaciones",e.target.value)} rows={2}/></div>
            </>
          )}
        </div>
        <div className="modal-footer">
          <button className="btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn-primary" onClick={save} disabled={loading}>{loading?"Guardando…":"Guardar"}</button>
        </div>
      </div>
    </div>
  );
}


// ── GESTOR EMPLEADOS ──
function GestorEmpleados({ empleados, token, onRefresh, apiB }) {
  const { useState } = React;
  const [search, setSearch] = React.useState("");
  const [editEmp, setEditEmp] = useState(null);

  const filtered = empleados.filter(e=>{
    const s = search.toLowerCase();
    return !s || e.nombre?.toLowerCase().includes(s) || e.cedula?.includes(s) || e.empresa?.toLowerCase().includes(s);
  });

  const eliminar = async (id) => {
    if(!confirm("¿Eliminar este empleado?")) return;
    await apiB(`empleados?id=eq.${id}`,{method:"DELETE",prefer:"return=minimal"});
    onRefresh();
  };

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"20px",flexWrap:"wrap",gap:"12px"}}>
        <div>
          <h2 style={{fontSize:"20px",fontWeight:"700",fontFamily:"Fraunces,serif"}}>Empleados</h2>
          <p style={{fontSize:"13px",color:"var(--text2)",marginTop:"3px"}}>{empleados.length} registros</p>
        </div>
        <button type="button" onClick={()=>setEditEmp({})} className="btn-primary" style={{display:"flex",alignItems:"center",gap:"6px"}}>
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4"/></svg>
          Nuevo empleado
        </button>
      </div>
      <div style={{marginBottom:"14px"}}>
        <div style={{position:"relative"}}>
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" style={{position:"absolute",left:"10px",top:"50%",transform:"translateY(-50%)",color:"var(--text3)"}}><circle cx="11" cy="11" r="8"/><path strokeLinecap="round" d="M21 21l-4.35-4.35"/></svg>
          <input placeholder="Buscar por nombre, cédula o empresa…" value={search} onChange={e=>setSearch(e.target.value)} style={{paddingLeft:"36px"}}/>
        </div>
      </div>
      <div className="card">
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>
              {["Cédula","Nombre","Cargo","Empresa","Celular","Correo","Estado",""].map(h=>(
                <th key={h} style={{fontSize:"10px",fontWeight:"600",color:"var(--text3)",textAlign:"left",padding:"8px 12px",borderBottom:"0.5px solid var(--border)",textTransform:"uppercase",letterSpacing:"0.05em",whiteSpace:"nowrap"}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {filtered.map(e=>(
                <tr key={e.id}>
                  <td style={{padding:"9px 12px",borderBottom:"0.5px solid var(--border)",fontSize:"13px",fontWeight:"500"}}>{e.cedula}</td>
                  <td style={{padding:"9px 12px",borderBottom:"0.5px solid var(--border)",fontSize:"13px"}}>{e.nombre}</td>
                  <td style={{padding:"9px 12px",borderBottom:"0.5px solid var(--border)",fontSize:"12px",color:"var(--text2)"}}>{e.cargo||"—"}</td>
                  <td style={{padding:"9px 12px",borderBottom:"0.5px solid var(--border)",fontSize:"12px",color:"var(--text2)"}}>{e.empresa||"—"}</td>
                  <td style={{padding:"9px 12px",borderBottom:"0.5px solid var(--border)",fontSize:"12px",color:"var(--text2)"}}>{e.celular||"—"}</td>
                  <td style={{padding:"9px 12px",borderBottom:"0.5px solid var(--border)",fontSize:"12px",color:"var(--text2)"}}>{e.correo||"—"}</td>
                  <td style={{padding:"9px 12px",borderBottom:"0.5px solid var(--border)"}}>
                    <span style={{fontSize:"11px",fontWeight:"600",padding:"2px 10px",borderRadius:"20px",
                      background:e.activo!==false?"#ecfdf5":"#fef2f2",
                      color:e.activo!==false?"#065f46":"#991b1b"}}>
                      {e.activo!==false?"Activo":"Inactivo"}
                    </span>
                  </td>
                  <td style={{padding:"9px 12px",borderBottom:"0.5px solid var(--border)"}}>
                    <div style={{display:"flex",gap:"6px"}}>
                      <button type="button" onClick={()=>setEditEmp(e)} style={{background:"none",color:"var(--text2)",padding:"4px 8px",borderRadius:"6px",border:"0.5px solid var(--border)",fontSize:"12px",cursor:"pointer"}}>Editar</button>
                      <button type="button" onClick={()=>eliminar(e.id)} style={{background:"none",color:"var(--danger)",padding:"4px 8px",borderRadius:"6px",border:"0.5px solid var(--danger)",fontSize:"12px",cursor:"pointer"}}>Eliminar</button>
                    </div>
                  </td>
                </tr>
              ))}
              {filtered.length===0 && <tr><td colSpan="7" style={{textAlign:"center",padding:"30px",color:"var(--text3)",fontSize:"13px"}}>No se encontraron empleados.</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
      {editEmp && <FormEmpleado emp={editEmp} onSave={()=>{setEditEmp(null);onRefresh();}} onClose={()=>setEditEmp(null)} apiB={apiB}/>}
    </div>
  );
}

            <div className="field"><label className="label">Cédula *</label><input value={form.cedula} onChange={e=>set("cedula",e.target.value)} placeholder="Número de cédula"/></div>
            <div className="field"><label className="label">Empresa</label>
            <select value={form.empresa} onChange={e=>set("empresa",e.target.value)}>
              <option value="">— Seleccionar empresa —</option>
              <option value="QUÍMICA ORIÓN S.A.S">QUÍMICA ORIÓN S.A.S</option>
              <option value="LOGÍSTICA INTEGRAL ALTAIRR S.A.S">LOGÍSTICA INTEGRAL ALTAIRR S.A.S</option>
              <option value="MAXPURE S.A.S">MAXPURE S.A.S</option>
              <option value="FIXNOVA S.A.S">FIXNOVA S.A.S</option>
            </select>
          </div>
          </div>
          <div className="field"><label className="label">Nombre completo *</label><input value={form.nombre} onChange={e=>set("nombre",e.target.value)}/></div>
          <div className="field"><label className="label">Cargo</label><input value={form.cargo} onChange={e=>set("cargo",e.target.value)}/></div>
          <div className="grid2">
            <div className="field"><label className="label">Celular</label><input value={form.celular} onChange={e=>set("celular",e.target.value)} placeholder="Ej: 3001234567"/></div>
            <div className="field"><label className="label">Correo</label><input type="email" value={form.correo} onChange={e=>set("correo",e.target.value)} placeholder="correo@empresa.com"/></div>
          </div>
          <div className="field">
            <label className="label">Estado del empleado</label>
            <div style={{display:"flex",gap:"10px",marginTop:"4px"}}>
              <label style={{display:"flex",alignItems:"center",gap:"6px",cursor:"pointer",fontSize:"14px"}}>
                <input type="radio" checked={form.activo!==false} onChange={()=>set("activo",true)} style={{accentColor:"#c9a84c"}}/> Activo
              </label>
              <label style={{display:"flex",alignItems:"center",gap:"6px",cursor:"pointer",fontSize:"14px"}}>
                <input type="radio" checked={form.activo===false} onChange={()=>set("activo",false)} style={{accentColor:"#dc2626"}}/> Inactivo
              </label>
            </div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn-primary" onClick={save} disabled={loading}>{loading?"Guardando…":"Guardar"}</button>
        </div>
      </div>
    </div>
  );
}

// ── MODULOS HOME ──
function ModulosHome({ isAdmin, modulosPermitidos=[], onSelectModulo, onLogout, userName }) {
  const hora = new Date().getHours();
  const saludo = hora < 12 ? "Buenos días" : hora < 18 ? "Buenas tardes" : "Buenas noches";
  const nombre = userName || (isAdmin ? "Mariale" : "");

  const modulos = [
    {
      id: "formacion", nombre: "Plan de formación", desc: "Capacitaciones, indicadores y evidencias",
      activo: true, acceso: isAdmin || modulosPermitidos.includes("formacion"),
      accentColor: "#c9a84c", iconBg: "#fdf9f0", badgeBg: "#fdf9f0", badgeColor: "#a8893a", badgeBorder: "#e8c97a",
      icon: <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#c9a84c" strokeWidth="1.5"><path strokeLinecap="round" strokeLinejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
    },
    {
      id: "biblioteca", nombre: "Biblioteca Orión", desc: "Libros, ejemplares y préstamos",
      activo: true, acceso: isAdmin || modulosPermitidos.includes("biblioteca"),
      accentColor: "#3b5bdb", iconBg: "#eff6ff", badgeBg: "#eff6ff", badgeColor: "#2d4abf", badgeBorder: "#93b4f4",
      icon: <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#3b5bdb" strokeWidth="1.5"><path strokeLinecap="round" strokeLinejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
    },
    {
      id: "seleccion", nombre: "Selección", desc: "Vacantes y candidatos",
      activo: false, acceso: false, accentColor: "#ece6dd", iconBg: "#f4f1ec",
      badgeBg: "#f4f1ec", badgeColor: "#b8b0a6", badgeBorder: "#ece6dd",
      icon: <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#b8b0a6" strokeWidth="1.5"><path strokeLinecap="round" strokeLinejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    },
    {
      id: "evaluacion", nombre: "Evaluación", desc: "Desempeño y seguimiento",
      activo: false, acceso: false, accentColor: "#ece6dd", iconBg: "#f4f1ec",
      badgeBg: "#f4f1ec", badgeColor: "#b8b0a6", badgeBorder: "#ece6dd",
      icon: <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#b8b0a6" strokeWidth="1.5"><path strokeLinecap="round" strokeLinejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
    },
    {
      id: "bienestar", nombre: "Bienestar", desc: "Clima y programas",
      activo: false, acceso: false, accentColor: "#ece6dd", iconBg: "#f4f1ec",
      badgeBg: "#f4f1ec", badgeColor: "#b8b0a6", badgeBorder: "#ece6dd",
      icon: <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#b8b0a6" strokeWidth="1.5"><path strokeLinecap="round" strokeLinejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
    },
  ];

  return (
    <div style={{minHeight:"100vh",background:"#f9f8f6",padding:"0"}}>
      <div style={{maxWidth:"860px",margin:"0 auto",padding:"44px 32px"}}>

        {/* Header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"44px"}}>
          <div>
            <div style={{fontFamily:"Fraunces,serif",fontWeight:"700",fontSize:"22px",letterSpacing:"-0.02em",color:"#1a1714"}}>Aura</div>
            <div style={{fontSize:"9px",color:"#c9a84c",letterSpacing:"0.22em",fontStyle:"italic",marginTop:"1px"}}>Brajá</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
            <span style={{fontSize:"11px",color:"#9e9890",background:"#ffffff",border:"0.5px solid #ece6dd",borderRadius:"20px",padding:"4px 12px"}}>
              {isAdmin ? "Admin" : "Colaborador"}
            </span>
            <button type="button" onClick={onLogout} style={{background:"none",border:"0.5px solid #ece6dd",borderRadius:"8px",padding:"5px 12px",fontSize:"11px",color:"#b8b0a6",cursor:"pointer"}}>Salir</button>

        <div style={{marginBottom:"32px"}}>

              style={{

                opacity:m.acceso?1:0.5,

              {/* Ícono */}
              <div style={{width:"36px",height:"36px",borderRadius:"8px",background:m.iconBg,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:"14px",marginTop:"4px"}}>

              <div style={{fontSize:"13px",fontWeight:"500",color:"#1a1714",marginBottom:"3px"}}>{m.nombre}</div>
              <div style={{fontSize:"11px",color:"#9e9890",lineHeight:"1.5",marginBottom:"14px"}}>{m.desc}</div>
              <span style={{display:"inline-block",fontSize:"10px",fontWeight:"500",padding:"2px 8px",borderRadius:"20px",letterSpacing:"0.03em",background:m.badgeBg,color:m.badgeColor,border:`0.5px solid ${m.badgeBorder}`}}>
                {m.activo?"Activo":"Próximamente"}
              </span>
            </div>
          ))}
        </div>

        {/* Footer */}
        <div style={{height:"0.5px",background:"#ece6dd",margin:"2.5rem 0 1.5rem"}}/>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontFamily:"Fraunces,serif",fontSize:"13px",color:"#1a1714"}}>Aura</div>
            <div style={{fontSize:"9px",color:"#c9a84c",letterSpacing:"0.2em",fontStyle:"italic"}}>Brajá</div>
          </div>
          <button type="button" onClick={onLogout} style={{fontSize:"11px",color:"#b8b0a6",background:"none",border:"none",cursor:"pointer",letterSpacing:"0.04em"}}>Cerrar sesión</button>
        </div>

      </div>
    </div>
  );
}

// ── APP ──
function App() {
  const [token, setToken] = useState(()=>localStorage.getItem("gh_token")||"");
  const [rol, setRol] = useState(()=>localStorage.getItem("gh_rol")||"");
  const [userId, setUserId] = useState(()=>localStorage.getItem("gh_uid")||"");
  const [modulosPermitidos, setModulosPermitidos] = useState(()=>{
    const m = localStorage.getItem("gh_modulos");
    return m ? JSON.parse(m) : ["formacion","biblioteca"];
  });
  const [moduloActivo, setModuloActivo] = useState("");
  const [page, setPage] = useState("dashboard");
  const [fichaActiva, setFichaActiva] = useState(null);
  const [caps, setCaps] = useState([]);
  const [empresas, setEmpresas] = useState([]);
  const [filtroEmpresa, setFiltroEmpresa] = useState("");
  const [loading, setLoading] = useState(false);

  const isAdmin = rol === "admin";

  const login = async (tok, user) => {
    localStorage.setItem("gh_token", tok);
    localStorage.setItem("gh_uid", user.id);
    setToken(tok);
    setUserId(user.id);
    const perfil = await fetchPerfil(user.id, tok);
    localStorage.setItem("gh_rol", perfil.rol);
    localStorage.setItem("gh_modulos", JSON.stringify(perfil.modulos || ["formacion","biblioteca"]));
    setRol(perfil.rol);
    setModulosPermitidos(perfil.modulos || ["formacion","biblioteca"]);
  };
  const logout = () => {
    localStorage.removeItem("gh_token");
    localStorage.removeItem("gh_rol");
    localStorage.removeItem("gh_uid");
    setToken(""); setRol(""); setUserId(""); setCaps([]); setEmpresas([]);
    setModuloActivo(""); setModulosPermitidos(["formacion","biblioteca"]);
    localStorage.removeItem("gh_modulos");
  };

  useEffect(()=>{ if(token) window.__aura_token = token; },[token]);

  const loadData = async () => {
    setLoading(true);
    try {
      const [emps, capList] = await Promise.all([
        api("empresas?select=*&order=nombre","",token),
        api("capacitaciones?select=*&order=numero","",token),
      ]);
      setEmpresas(emps||[]);
      setCaps(capList||[]);
    } catch(e){ console.error(e); }
    finally{ setLoading(false); }
  };

  useEffect(()=>{ if(token) loadData(); },[token]);

  if(!token) return <Login onLogin={login}/>;
  if(!moduloActivo) return <ModulosHome isAdmin={isAdmin} modulosPermitidos={modulosPermitidos} onSelectModulo={setModuloActivo} onLogout={logout} userName={isAdmin?"Mariale":""}/>;
  if(moduloActivo === "biblioteca") return <ModuloBiblioteca token={token} isAdmin={isAdmin} onBack={()=>setModuloActivo("")} onLogout={logout}/>;

  const filteredCaps = filtroEmpresa ? caps.filter(c=>c.empresa_id===filtroEmpresa) : caps;

  return (
    <div className="app-layout">
      <div className="sidebar">
        <div style={{padding:"20px 16px 12px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"20px"}}>
            <div style={{width:"34px",height:"34px",background:"#c9a84c",borderRadius:"9px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <svg width="20" height="14" viewBox="0 0 52 38" fill="none"><path d="M4 34 A24 24 0 0 1 48 34" stroke="white" strokeWidth="1.2" strokeLinecap="round"/><path d="M12 34 A16 16 0 0 1 40 34" stroke="white" strokeWidth="1.2" strokeLinecap="round"/><circle cx="26" cy="34" r="2.5" fill="white"/></svg>
            </div>
            <div>
              <div style={{fontFamily:"Fraunces,serif",fontWeight:"700",fontSize:"20px",lineHeight:"1.1",letterSpacing:"-0.02em",color:"#1a1714"}}>Aura</div>
              <div style={{fontSize:"9px",color:"var(--accent)",letterSpacing:"0.1em",textTransform:"uppercase",marginTop:"3px",fontWeight:"600"}}>{isAdmin?"Admin":"Colaborador"}</div>
            </div>
          </div>
          <div style={{marginBottom:"16px"}}>
            <div style={{fontSize:"10px",color:"#9e9890",fontWeight:"600",marginBottom:"6px",textTransform:"uppercase",letterSpacing:"0.08em",paddingLeft:"4px"}}>Empresa</div>
            <select value={filtroEmpresa} onChange={e=>setFiltroEmpresa(e.target.value)} style={{fontSize:"13px",padding:"7px 10px",background:"#ffffff",color:"#4a4540",border:"1px solid #e8e0d0",borderRadius:"8px"}}>
              <option value="">Todas</option>
              {empresas.map(e=><option key={e.id} value={e.id}>{e.nombre.split(" ").slice(0,2).join(" ")}</option>)}
            </select>
          </div>
        </div>
        <nav style={{flex:1,padding:"0 8px"}}>
          <div style={{fontSize:"10px",color:"#9e9890",fontWeight:"600",marginBottom:"6px",textTransform:"uppercase",letterSpacing:"0.08em",paddingLeft:"8px"}}>Menú</div>
          {[{id:"dashboard",label:"Inicio",icon:Ico.home},{id:"listado",label:"Capacitaciones",icon:Ico.list},...(isAdmin?[{id:"empresas",label:"Empresas",icon:Ico.building}]:[])].map(item=>(
            <button key={item.id} type="button" className={`nav-item${page===item.id?" active":""}`} onClick={()=>{ setPage(item.id); setFichaActiva(null); }}>
              {item.icon} {item.label}
            </button>
          ))}
        </nav>
        <div style={{padding:"12px 8px",borderTop:"1px solid #e8e0d0"}}>
          <button type="button" onClick={()=>exportExcel(filteredCaps,empresas)} className="nav-item" style={{width:"100%"}}>
            {Ico.download} Exportar Excel
          </button>
          <button type="button" onClick={()=>{ setModuloActivo(""); setFichaActiva(null); }} className="nav-item" style={{width:"100%"}}>
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M3 12h18M3 12l6-6M3 12l6 6"/></svg> Módulos
          </button>
          <button type="button" onClick={logout} className="nav-item" style={{width:"100%",color:"var(--danger)"}}>
            {Ico.logout} Cerrar sesión
          </button>
        </div>
      </div>
      <div className="main">
        {loading
          ? <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"60vh",color:"var(--text3)"}}>Cargando datos…</div>
          : page==="dashboard"
            ? <Dashboard caps={filteredCaps} empresas={empresas} fichaActiva={fichaActiva} setFichaActiva={setFichaActiva}/>
            : page==="empresas" && isAdmin
              ? <Empresas empresas={empresas} token={token} onRefresh={loadData}/>
              : <Listado caps={filteredCaps} empresas={empresas} token={token} onRefresh={loadData} isAdmin={isAdmin}/>
        }
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
