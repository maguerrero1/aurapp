// ── REGISTROS HISTÓRICOS ──
function RegistrosHistoricos({ registros, meta, periodoKey, empNombre, token, onActualizar }) {
  const { useState } = React;
  const [expandido, setExpandido] = useState(null);
  const [editando, setEditando] = useState(null);
  const [valAnalisis, setValAnalisis] = useState("");
  const [valAcciones, setValAcciones] = useState("");
  const [guardando, setGuardando] = useState(false);

  const abrirEdicion = (r) => {
    setEditando(r.id);
    setValAnalisis(r.analisis || "");
    setValAcciones(r.acciones || "");
  };

  const guardarEdicion = async (id) => {
    setGuardando(true);
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/registros_indicadores?id=eq.${id}`, {
        method: "PATCH",
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, "Content-Type": "application/json", Prefer: "return=minimal" },
        body: JSON.stringify({ analisis: valAnalisis, acciones: valAcciones, updated_at: new Date().toISOString() })
      });
      setEditando(null);
      onActualizar();
    } catch(e) { console.error(e); }
    setGuardando(false);
  };

  return (
    <div style={{background:"var(--surface)",border:"0.5px solid var(--border)",borderRadius:"12px",padding:"20px"}}>
      <div style={{fontSize:"10px",fontWeight:"600",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"16px"}}>
        Registros históricos · {empNombre.split(" ").slice(0,2).join(" ")}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
        {registros.map((r,i)=>{
          const c = r.denominador===0 ? "var(--text3)" : r.resultado >= meta ? "#c9a84c" : r.resultado >= meta*0.6 ? "#d97706" : "#dc2626";
          const bg = r.denominador===0 ? "var(--surface2)" : r.resultado >= meta ? "#fdf9f0" : r.resultado >= meta*0.6 ? "#fffbeb" : "#fef2f2";
          const isExp = expandido === r.id;
          const isEdit = editando === r.id;
          const esPeriodoActual = r.periodo === periodoKey;
          return (
            <div key={r.id} style={{border:"0.5px solid var(--border)",borderRadius:"10px",overflow:"hidden"}}>
              {/* Fila resumen */}
              <div style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px 16px",background:esPeriodoActual?"var(--surface2)":"var(--surface)",cursor:"pointer"}}
                onClick={()=>setExpandido(isExp ? null : r.id)}>
                <div style={{flex:"0 0 110px"}}>
                  <div style={{fontSize:"13px",fontWeight:"500",color:"var(--text)"}}>{r.periodo}</div>
                  {esPeriodoActual && <div style={{fontSize:"9px",color:"#c9a84c",fontWeight:"600",textTransform:"uppercase",letterSpacing:"0.06em",marginTop:"1px"}}>Período actual</div>}
                </div>
                <div style={{flex:"0 0 70px"}}>
                  <span style={{fontFamily:"Fraunces,serif",fontSize:"20px",fontWeight:"700",color:c}}>
                          {r.denominador===0 ? "—" : r.resultado !== null ? r.resultado+"%" : "—"}
                        </span>
                </div>
                <div style={{flex:"0 0 80px"}}>
                  <span style={{fontSize:"11px",fontWeight:"600",padding:"2px 10px",borderRadius:"20px",background:bg,color:c}}>{r.denominador===0 ? "Sin programación" : r.resultado >= meta ? "Cumple" : "No cumple"}</span>
                </div>
                <div style={{flex:1,fontSize:"12px",color:"var(--text2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {r.analisis ? r.analisis.slice(0,60)+"…" : <span style={{color:"var(--text3)",fontStyle:"italic"}}>Sin análisis</span>}
                </div>
                <div style={{fontSize:"11px",color:"var(--text3)",flexShrink:0}}>
                  {isExp ? "▲" : "▼"}
                </div>
              </div>

              {/* Detalle expandido */}
              {isExp && (
                <div style={{padding:"16px",borderTop:"0.5px solid var(--border)",background:"var(--bg)"}}>
                  <div style={{display:"flex",justifyContent:"flex-end",gap:"8px",marginBottom:"12px"}}>
                    {!isEdit
                      ? <button type="button" onClick={()=>abrirEdicion(r)} style={{fontSize:"12px",padding:"5px 14px",border:"0.5px solid var(--border)",borderRadius:"7px",background:"none",color:"var(--text2)",cursor:"pointer"}}>Editar</button>
                      : <>
                          <button type="button" onClick={()=>setEditando(null)} style={{fontSize:"12px",padding:"5px 12px",border:"0.5px solid var(--border)",borderRadius:"7px",background:"none",color:"var(--text2)",cursor:"pointer"}}>Cancelar</button>
                          <button type="button" onClick={()=>guardarEdicion(r.id)} disabled={guardando} style={{fontSize:"12px",padding:"5px 14px",border:"none",borderRadius:"7px",background:"#1a1714",color:"white",cursor:"pointer",fontWeight:"500"}}>
                            {guardando ? "Guardando…" : "Guardar cambios"}
                          </button>
                        </>
                    }
                  </div>

                  <div style={{marginBottom:"14px"}}>
                    <div style={{fontSize:"10px",fontWeight:"600",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"8px"}}>Análisis</div>
                    {isEdit
                      ? <textarea value={valAnalisis} onChange={e=>setValAnalisis(e.target.value)}
                          style={{width:"100%",minHeight:"120px",fontSize:"14px",lineHeight:"1.7",color:"var(--text)",border:"0.5px solid var(--border)",borderRadius:"8px",padding:"12px",background:"var(--surface)",fontFamily:"var(--font-sans)"}}/>
                      : <p style={{fontSize:"14px",lineHeight:"1.8",color:"var(--text)"}}>{r.analisis || <span style={{color:"var(--text3)",fontStyle:"italic"}}>Sin análisis registrado.</span>}</p>
                    }
                  </div>

                  {(r.acciones || isEdit) && (
                    <div>
                      <div style={{fontSize:"10px",fontWeight:"600",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"8px"}}>Acciones</div>
                      {isEdit
                        ? <textarea value={valAcciones} onChange={e=>setValAcciones(e.target.value)}
                            style={{width:"100%",minHeight:"80px",fontSize:"14px",lineHeight:"1.7",color:"var(--text)",border:"0.5px solid var(--border)",borderRadius:"8px",padding:"12px",background:"var(--surface)",fontFamily:"var(--font-sans)"}}/>
                        : <p style={{fontSize:"14px",lineHeight:"1.8",color:"var(--text)"}}>{r.acciones}</p>
                      }
                    </div>
                  )}

                  <div style={{display:"flex",gap:"16px",marginTop:"14px",paddingTop:"12px",borderTop:"0.5px solid var(--border)"}}>
                    <div style={{fontSize:"12px",color:"var(--text2)"}}>
                      <span style={{color:"var(--text3)"}}>Numerador: </span>{r.numerador}
                    </div>
                    <div style={{fontSize:"12px",color:"var(--text2)"}}>
                      <span style={{color:"var(--text3)"}}>Denominador: </span>{r.denominador}
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── FICHA INDICADOR ──
function FichaIndicador({ tipo, caps, empresas, token, onClose }) {
  const isCumplimiento = tipo === "cumplimiento";
  const { useState, useEffect } = React;

  const [empresaId, setEmpresaId] = useState("");
  const [mesPeriodo, setMesPeriodo] = useState(new Date().getMonth());
  const [anioPeriodo, setAnioPeriodo] = useState(new Date().getFullYear());
  const [analisis, setAnalisis] = useState("");
  const [acciones, setAcciones] = useState("");
  const [generando, setGenerando] = useState(false);
  const [editandoAnalisis, setEditandoAnalisis] = useState(false);
  const [editandoAcciones, setEditandoAcciones] = useState(false);
  const [registros, setRegistros] = useState([]);
  const [guardando, setGuardando] = useState(false);
  const [guardadoOk, setGuardadoOk] = useState(false);
  const [registroActual, setRegistroActual] = useState(null);

  // Período actual
  const hoy = new Date();
  const mesActual = hoy.toLocaleString("es-CO", { month: "long" });
  const anio = hoy.getFullYear();
  const trimestre = Math.ceil((hoy.getMonth()+1)/3);
  const periodoKey = isCumplimiento
    ? `${mesActual.charAt(0).toUpperCase()+mesActual.slice(1)} ${anio}`
    : `T${trimestre} ${anio}`;

  // Caps filtradas por empresa seleccionada
  const capsEmp = empresaId ? caps.filter(c=>c.empresa_id===empresaId) : caps;
  const empNombre = empresas.find(e=>e.id===empresaId)?.nombre || "Todas las empresas";

  // Cálculos
  // Cumplimiento: usar el período seleccionado
  const programadasPeriodo = isCumplimiento ? capsEmp.filter(c=>{
    if(!c.mes_programado) return false;
    const d = new Date(c.mes_programado);
    return d.getMonth() === mesPeriodo && d.getFullYear() === anioPeriodo;
  }).length : 0;

  const ejecutadasPeriodo = isCumplimiento ? capsEmp.filter(c=>{
    if(c.estado!=="Ejecutada" || !c.mes_programado) return false;
    const d = new Date(c.mes_programado);
    return d.getMonth() === mesPeriodo && d.getFullYear() === anioPeriodo;
  }).length : 0;

  const conMesProg = isCumplimiento ? programadasPeriodo : 0;
  const ejecutadas = isCumplimiento ? ejecutadasPeriodo : capsEmp.filter(c=>c.estado==="Ejecutada").length;
  const pctCumplimiento = conMesProg > 0 ? Math.round((ejecutadas/conMesProg)*100) : 0;

  // periodoKey dinámico según mes seleccionado
  const periodoKeyCalc = isCumplimiento
    ? `${MESES[mesPeriodo]} ${anioPeriodo}`
    : periodoKey;
  const evaluadas = capsEmp.filter(c=>c.estado==="Ejecutada" && c.eficacia_fecha);
  const eficaces = evaluadas.filter(c=>c.fue_eficaz===true).length;
  const pctEficacia = evaluadas.length > 0 ? Math.round((eficaces/evaluadas.length)*100) : 0;

  const resultado = isCumplimiento ? pctCumplimiento : pctEficacia;
  const meta = isCumplimiento ? 80 : 75;
  const cumpleMeta = resultado >= meta;

  const fichaData = isCumplimiento ? {
    nombre: "Cumplimiento del Plan de Capacitación",
    objetivo: "Medir el grado de cumplimiento del plan de capacitaciones y/o actividades de formación programadas, con el fin de asegurar el desarrollo de competencias del personal conforme a los requerimientos organizacionales.",
    formula: "(Número de capacitaciones ejecutadas / Número de capacitaciones programadas en el período) × 100",
    meta: "≥ 80 %", frecuenciaMedicion: "Mensual", frecuenciaAnalisis: "Mensual",
    fuente: "Plan de formación", cargos: "Gerencia · Líderes",
    responsable: "Líder Senior de Gestión Humana",
    numerador: ejecutadasPeriodo, denominador: programadasPeriodo,
    labelNum: "Ejecutadas en el período", labelDen: "Programadas en el período",
  } : {
    nombre: "Eficacia de la Capacitación",
    objetivo: "Medir el porcentaje de capacitaciones que cumplen con los criterios de eficacia definidos por la organización, con el fin de evaluar la efectividad del plan de formación y optimizar las acciones de desarrollo implementadas.",
    formula: "(Número de capacitaciones que cumplen los criterios de eficacia / Total de capacitaciones evaluadas) × 100",
    meta: "≥ 75 %", frecuenciaMedicion: "Trimestral", frecuenciaAnalisis: "Trimestral",
    fuente: "Evaluaciones post capacitación · Encuestas · Resultados · Informes de seguimiento",
    cargos: "Gerencia", responsable: "Líder Senior de Gestión Humana",
    numerador: eficaces, denominador: evaluadas.length,
    labelNum: "Capacitaciones eficaces", labelDen: "Total evaluadas",
  };

  // Cargar registros cuando cambia empresa
  useEffect(()=>{ if(empresaId !== undefined) cargarRegistros(`${MESES[mesPeriodo]} ${anioPeriodo}`); },[empresaId, mesPeriodo, anioPeriodo]);

  const cargarRegistros = async (periodoOverride) => {
    try {
      const nombreInd = isCumplimiento ? "cumplimiento" : "eficacia";
      const empFilter = empresaId ? `&empresa_id=eq.${empresaId}` : `&empresa_id=is.null`;
      const res = await fetch(`${SUPABASE_URL}/rest/v1/registros_indicadores?indicador=eq.${nombreInd}${empFilter}&order=created_at.desc&select=*`, {
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
      });
      const data = await res.json();
      setRegistros(Array.isArray(data) ? data : []);
      const periodoBuscar = periodoOverride || (isCumplimiento ? `${MESES[mesPeriodo]} ${anioPeriodo}` : periodoKey);
      const actual = (Array.isArray(data)?data:[]).find(r=>r.periodo===periodoBuscar);
      if(actual) { setRegistroActual(actual); setAnalisis(actual.analisis||""); setAcciones(actual.acciones||""); }
      else { setRegistroActual(null); setAnalisis(""); setAcciones(""); }
    } catch(e) { console.error(e); }
  };

  const guardarRegistro = async () => {
    if(!empresaId) { alert("Selecciona una empresa antes de guardar."); return; }
    setGuardando(true);
    const nombreInd = isCumplimiento ? "cumplimiento" : "eficacia";
    const periodoPeriodo = isCumplimiento ? `${MESES[mesPeriodo]} ${anioPeriodo}` : periodoKey;
    const payload = {
      indicador: nombreInd, periodo: periodoPeriodo, empresa_id: empresaId,
      resultado, numerador: fichaData.numerador, denominador: fichaData.denominador,
      analisis, acciones, updated_at: new Date().toISOString()
    };
    try {
      // Find record for THIS specific period
      const registroPeriodo = registros.find(r=>r.periodo===periodoPeriodo && r.empresa_id===empresaId);
      if(registroPeriodo) {
        const patchRes = await fetch(`${SUPABASE_URL}/rest/v1/registros_indicadores?id=eq.${registroPeriodo.id}`, {
          method: "PATCH",
          headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, "Content-Type": "application/json", Prefer: "return=representation" },
          body: JSON.stringify(payload)
        });
        if(!patchRes.ok) { const t = await patchRes.text(); throw new Error("PATCH falló: " + t); }
      } else {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/registros_indicadores`, {
          method: "POST",
          headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, "Content-Type": "application/json", Prefer: "return=representation" },
          body: JSON.stringify(payload)
        });
        const txt = await res.text();
        if(!res.ok) throw new Error("POST falló: " + txt);
        const data = txt ? JSON.parse(txt) : [];
        if(Array.isArray(data)&&data[0]) setRegistroActual(data[0]);
      }
      setGuardadoOk(true);
      setTimeout(()=>setGuardadoOk(false), 2500);
      cargarRegistros(isCumplimiento ? `${MESES[mesPeriodo]} ${anioPeriodo}` : periodoKey);
    } catch(e) { 
      console.error(e); 
      alert("Error al guardar: " + e.message);
    }
    setGuardando(false);
  };

  const generarAnalisis = async () => {
    if(!empresaId) { alert("Selecciona una empresa antes de generar el análisis."); return; }
    setGenerando(true);
    const ejemplos = isCumplimiento ? `
Ejemplos del tono y estilo esperado (para la empresa ${empNombre}):
- Sin ejecución: "Durante el mes de [mes] no se programaron ni ejecutaron capacitaciones en [empresa], debido a que el área se encontraba realizando el diagnóstico de necesidades de formación."
- 100%: "Durante el mes de [mes] se programaron [N] formaciones en [empresa], las cuales fueron ejecutadas en su totalidad, alcanzando un cumplimiento del 100%."
- Parcial: "Durante el mes de [mes] se ejecutaron [N] de las [M] capacitaciones programadas en [empresa], alcanzando un cumplimiento del [X]%."` : "";

    const prompt = `Eres analista de gestión humana. Genera un análisis profesional y natural (máximo 4 oraciones) para el indicador "${fichaData.nombre}" en la empresa ${empNombre}:
- Período: ${periodoKey}
- Resultado: ${fichaData.denominador > 0 ? resultado+"%" : "Sin datos"}
- Meta: ${meta}%
- Estado: ${fichaData.denominador > 0 ? (cumpleMeta ? "CUMPLE" : "NO cumple") : "Sin datos"}
- Numerador: ${fichaData.numerador} ${fichaData.labelNum.toLowerCase()}
- Denominador: ${fichaData.denominador} ${fichaData.labelDen.toLowerCase()}
${ejemplos}
Escribe SOLO el análisis en español, párrafo corrido, sin títulos. Tono profesional pero natural.
Luego en nueva línea escribe "ACCIONES:" seguido de 1-2 acciones concretas.`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, messages: [{ role: "user", content: prompt }] })
      });
      const data = await res.json();
      const texto = data.content?.[0]?.text || "";
      const partes = texto.split("ACCIONES:");
      setAnalisis(partes[0].trim());
      setAcciones(partes[1]?.trim() || "");
      setEditandoAnalisis(false); setEditandoAcciones(false);
    } catch(e) { setAnalisis("No se pudo generar el análisis. Puedes escribirlo manualmente."); }
    setGenerando(false);
  };

  const colorRes = resultado >= meta ? "#c9a84c" : resultado >= meta*0.6 ? "#d97706" : "#dc2626";
  const bgRes = resultado >= meta ? "#fdf9f0" : resultado >= meta*0.6 ? "#fffbeb" : "#fef2f2";

  return (
    <div style={{minHeight:"100vh",background:"var(--bg)"}}>
      <div style={{maxWidth:"860px",margin:"0 auto",padding:"32px"}}>

        {/* Header */}
        <div style={{display:"flex",alignItems:"center",gap:"14px",marginBottom:"28px",flexWrap:"wrap"}}>
          <button type="button" onClick={onClose} style={{display:"flex",alignItems:"center",gap:"6px",background:"none",border:"0.5px solid var(--border)",borderRadius:"8px",padding:"7px 14px",fontSize:"13px",color:"var(--text2)",cursor:"pointer"}}>
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
            Volver
          </button>
          <div style={{flex:1}}>
            <div style={{fontSize:"10px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"2px"}}>Ficha técnica · {fichaData.frecuenciaMedicion}</div>
            <h2 style={{fontSize:"20px",fontWeight:"700",color:"var(--text)",fontFamily:"Fraunces,serif"}}>{fichaData.nombre}</h2>
          </div>
          <div style={{display:"flex",gap:"8px",alignItems:"center",flexWrap:"wrap"}}>
            {guardadoOk && <span style={{fontSize:"12px",color:"#059669",fontWeight:"500"}}>✓ Guardado</span>}
            <button type="button" onClick={guardarRegistro} disabled={guardando||!empresaId} style={{fontSize:"12px",padding:"7px 16px",border:"none",borderRadius:"8px",background:"#1a1714",color:"white",cursor:"pointer",fontWeight:"500",opacity:(guardando||!empresaId)?0.45:1}}>
              {guardando ? "Guardando…" : `Guardar ${isCumplimiento ? MESES[mesPeriodo]+" "+anioPeriodo : periodoKey}`}
            </button>
          </div>
        </div>

        {/* Selector de empresa — prominente */}
        <div style={{background:"var(--surface)",border:"1px solid #c9a84c40",borderRadius:"12px",padding:"18px 20px",marginBottom:"20px"}}>
          <div style={{fontSize:"10px",fontWeight:"600",color:"#a8893a",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"10px"}}>Empresa a analizar</div>
          <div style={{display:"flex",gap:"10px",flexWrap:"wrap"}}>
            {empresas.map(e=>(
              <button key={e.id} type="button" onClick={()=>setEmpresaId(e.id)}
                style={{padding:"8px 18px",borderRadius:"8px",fontSize:"13px",fontWeight:"500",cursor:"pointer",border:"0.5px solid",
                  borderColor:empresaId===e.id?"#c9a84c":"var(--border)",
                  background:empresaId===e.id?"#fdf9f0":"var(--surface)",
                  color:empresaId===e.id?"#a8893a":"var(--text2)"}}>
                {e.nombre.split(" ").slice(0,2).join(" ")}
              </button>
            ))}
          </div>
          {!empresaId && <div style={{fontSize:"12px",color:"var(--text3)",marginTop:"10px"}}>Selecciona una empresa para ver su resultado, generar el análisis y guardar el registro.</div>}
        </div>
        {isCumplimiento && empresaId && (
          <div style={{marginTop:"12px",display:"flex",alignItems:"center",gap:"10px",flexWrap:"wrap"}}>
            <div style={{fontSize:"11px",fontWeight:"600",color:"var(--text2)"}}>Período a analizar:</div>
            <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
              {MESES.map((mes,i)=>{
                const esFuturo = i > hoy.getMonth() && anioPeriodo >= hoy.getFullYear();
                if(esFuturo) return null;
                return (
                  <button key={i} type="button" onClick={()=>{ setMesPeriodo(i); }}
                    style={{padding:"4px 12px",borderRadius:"6px",fontSize:"12px",cursor:"pointer",border:"0.5px solid",
                      borderColor:mesPeriodo===i?"#c9a84c":"var(--border)",
                      background:mesPeriodo===i?"#fdf9f0":"var(--surface)",
                      color:mesPeriodo===i?"#a8893a":"var(--text2)",fontWeight:mesPeriodo===i?"600":"400"}}>
                    {mes.slice(0,3)}
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* Resultado */}
        <div style={{background:empresaId?bgRes:"var(--surface2)",border:`1px solid ${empresaId?colorRes+"25":"var(--border)"}`,borderRadius:"14px",padding:"22px 26px",marginBottom:"20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"16px"}}>
          <div>
            <div style={{fontSize:"10px",fontWeight:"600",color:empresaId?colorRes:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"4px"}}>
              {empresaId ? `Resultado · ${periodoKey} · ${empNombre.split(" ").slice(0,2).join(" ")}` : `Resultado · ${isCumplimiento ? MESES[mesPeriodo]+" "+anioPeriodo : periodoKey}`}
            </div>
            <div style={{fontFamily:"Fraunces,serif",fontSize:"52px",fontWeight:"700",color:empresaId?colorRes:"var(--text3)",lineHeight:"1"}}>
              {empresaId ? (fichaData.denominador > 0 ? resultado+"%" : "—") : "—"}
            </div>
            <div style={{fontSize:"13px",color:"var(--text2)",marginTop:"6px"}}>
              {empresaId ? `${fichaData.numerador} de ${fichaData.denominador} · Meta: ${fichaData.meta} · ${periodoKeyCalc}` : "Selecciona una empresa para ver el resultado"}
            </div>
          </div>
          {empresaId && (
            <span style={{display:"inline-block",background:cumpleMeta&&fichaData.denominador>0?"#ecfdf5":"#fef2f2",color:cumpleMeta&&fichaData.denominador>0?"#065f46":"#991b1b",fontSize:"12px",fontWeight:"600",padding:"6px 16px",borderRadius:"20px"}}>
              {fichaData.denominador > 0 ? (cumpleMeta ? "✓ Cumple la meta" : "✗ Por debajo de la meta") : "Sin datos aún"}
            </span>
          )}
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px",marginBottom:"16px"}}>
          {/* Ficha técnica */}
          <div style={{background:"var(--surface)",border:"0.5px solid var(--border)",borderRadius:"12px",padding:"18px"}}>
            <div style={{fontSize:"10px",fontWeight:"600",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"12px"}}>Ficha técnica</div>
            {[
              {l:"Objetivo",v:fichaData.objetivo},{l:"Fórmula",v:fichaData.formula},
              {l:"Meta",v:fichaData.meta},{l:"Frecuencia medición",v:fichaData.frecuenciaMedicion},
              {l:"Frecuencia análisis",v:fichaData.frecuenciaAnalisis},{l:"Fuente",v:fichaData.fuente},
              {l:"Cargos",v:fichaData.cargos},{l:"Responsable",v:fichaData.responsable},
            ].map((f,i)=>(
              <div key={i} style={{padding:"7px 0",borderBottom:"0.5px solid var(--border)"}}>
                <div style={{fontSize:"9px",fontWeight:"600",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"2px"}}>{f.l}</div>
                <div style={{fontSize:"12px",color:"var(--text)",lineHeight:"1.5"}}>{f.v}</div>
              </div>
            ))}
          </div>

          {/* Cálculo + histórico rápido */}
          <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
            {registros.length > 0 && (
              <div style={{background:"var(--surface)",border:"0.5px solid var(--border)",borderRadius:"12px",padding:"18px"}}>
                <div style={{fontSize:"10px",fontWeight:"600",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"10px"}}>Histórico · {empNombre.split(" ")[0]}</div>
                {registros.slice(0,5).map((r,i)=>{
                  const c = r.denominador===0 ? "var(--text3)" : r.resultado >= meta ? "#c9a84c" : r.resultado >= meta*0.6 ? "#d97706" : "#dc2626";
                  return (
                    <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 8px",background:"var(--surface2)",borderRadius:"7px",marginBottom:"5px"}}>
                      <span style={{fontSize:"12px",color:"var(--text2)"}}>{r.periodo}</span>
                      <span style={{fontSize:"13px",fontWeight:"700",color:c,fontFamily:"Fraunces,serif"}}>{r.resultado !== null ? r.resultado+"%" : "—"}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>

        {/* Análisis */}
        <div style={{background:"var(--surface)",border:"0.5px solid var(--border)",borderRadius:"12px",padding:"20px",marginBottom:"14px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px",flexWrap:"wrap",gap:"10px"}}>
            <div style={{fontSize:"10px",fontWeight:"600",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em"}}>
              Análisis · {periodoKey}{empresaId ? ` · ${empNombre.split(" ")[0]}` : ""}
            </div>
            <div style={{display:"flex",gap:"8px"}}>
              {analisis && !editandoAnalisis && <button type="button" onClick={()=>setEditandoAnalisis(true)} style={{fontSize:"12px",padding:"5px 12px",border:"0.5px solid var(--border)",borderRadius:"7px",background:"none",color:"var(--text2)",cursor:"pointer"}}>Editar</button>}
              {editandoAnalisis && <button type="button" onClick={()=>setEditandoAnalisis(false)} style={{fontSize:"12px",padding:"5px 12px",border:"0.5px solid var(--border)",borderRadius:"7px",background:"#1a1714",color:"white",cursor:"pointer"}}>Listo</button>}
              <button type="button" onClick={generarAnalisis} disabled={generando||!empresaId} style={{fontSize:"12px",padding:"5px 14px",border:"none",borderRadius:"7px",background:"#c9a84c",color:"#1a1714",cursor:"pointer",fontWeight:"600",opacity:(generando||!empresaId)?0.5:1}}>
                {generando ? "Generando…" : analisis ? "Regenerar ✦" : "Generar análisis ✦"}
              </button>
            </div>
          </div>
          {!empresaId && <div style={{textAlign:"center",padding:"20px",color:"var(--text3)",fontSize:"13px"}}>Selecciona una empresa para generar o ver el análisis de este período.</div>}
          {empresaId && !analisis && !generando && (
            <div style={{textAlign:"center",padding:"24px"}}>
              <div style={{fontSize:"13px",color:"var(--text2)",marginBottom:"14px"}}>
                Los datos del período están listos. Haz clic en <strong>Generar análisis ✦</strong> para crear el análisis automáticamente con IA.
              </div>
              <button type="button" onClick={generarAnalisis} style={{fontSize:"13px",padding:"9px 22px",border:"none",borderRadius:"8px",background:"#c9a84c",color:"#1a1714",cursor:"pointer",fontWeight:"600"}}>
                Generar análisis ✦
              </button>
            </div>
          )}
          {generando && <div style={{textAlign:"center",padding:"24px",color:"var(--text3)",fontSize:"13px"}}>Analizando los datos…</div>}
          {analisis && !generando && (
            editandoAnalisis
              ? <textarea value={analisis} onChange={e=>setAnalisis(e.target.value)} style={{width:"100%",minHeight:"100px",fontSize:"14px",lineHeight:"1.7",color:"var(--text)",border:"0.5px solid var(--border)",borderRadius:"8px",padding:"12px",background:"var(--surface2)",fontFamily:"var(--font-sans)"}}/>
              : <p style={{fontSize:"14px",lineHeight:"1.8",color:"var(--text)"}}>{analisis}</p>
          )}
        </div>

        {/* Acciones */}
        {analisis && (
          <div style={{background:"var(--surface)",border:"0.5px solid var(--border)",borderRadius:"12px",padding:"20px",marginBottom:"14px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px"}}>
              <div style={{fontSize:"10px",fontWeight:"600",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em"}}>Acciones · {periodoKey}{empresaId?` · ${empNombre.split(" ")[0]}`:""}</div>
              <div style={{display:"flex",gap:"8px"}}>
                {acciones && !editandoAcciones && <button type="button" onClick={()=>setEditandoAcciones(true)} style={{fontSize:"12px",padding:"5px 12px",border:"0.5px solid var(--border)",borderRadius:"7px",background:"none",color:"var(--text2)",cursor:"pointer"}}>Editar</button>}
                {editandoAcciones && <button type="button" onClick={()=>setEditandoAcciones(false)} style={{fontSize:"12px",padding:"5px 12px",border:"0.5px solid var(--border)",borderRadius:"7px",background:"#1a1714",color:"white",cursor:"pointer"}}>Listo</button>}
              </div>
            </div>
            {acciones
              ? editandoAcciones
                ? <textarea value={acciones} onChange={e=>setAcciones(e.target.value)} style={{width:"100%",minHeight:"80px",fontSize:"14px",lineHeight:"1.7",color:"var(--text)",border:"0.5px solid var(--border)",borderRadius:"8px",padding:"12px",background:"var(--surface2)",fontFamily:"var(--font-sans)"}}/>
                : <p style={{fontSize:"14px",lineHeight:"1.8",color:"var(--text)"}}>{acciones}</p>
              : <div style={{fontSize:"13px",color:"var(--text3)"}}>Las acciones se generarán junto con el análisis.</div>
            }
          </div>
        )}

        {/* Registros históricos expandibles */}
        {registros.length > 0 && (
          <RegistrosHistoricos registros={registros} meta={meta} periodoKey={periodoKey} empNombre={empNombre} token={token} onActualizar={cargarRegistros}/>
        )}

      </div>
    </div>
  );
}


function Dashboard({ caps, empresas, fichaActiva, setFichaActiva }) {
  const total = caps.length;
  const ejecutadas = caps.filter(c=>c.estado==="Ejecutada").length;
  const enProceso = caps.filter(c=>c.estado==="En proceso").length;
  const sinIniciar = caps.filter(c=>c.estado==="Sin iniciar").length;

  // Indicador 1: % cumplimiento = ejecutadas / programadas en el período × 100
  // % cumplimiento ACUMULADO ANUAL = ejecutadas / programadas en el año hasta hoy
  const hoyDate = new Date();
  const anioActual = hoyDate.getFullYear();
  const programadasHastaHoy = caps.filter(c=>{
    if(!c.mes_programado) return false;
    const d = new Date(c.mes_programado);
    return d.getFullYear() === anioActual && d <= hoyDate;
  }).length;
  const conMesProg = programadasHastaHoy > 0 ? programadasHastaHoy : caps.filter(c=>c.mes_programado).length;
  const pctCumplimiento = conMesProg > 0 ? Math.round((ejecutadas/conMesProg)*100) : 0;

  // Indicador 2: % eficacia = marcadas eficaz / total ejecutadas con evaluación
  const evaluadas = caps.filter(c=>c.estado==="Ejecutada" && c.eficacia_fecha);
  const eficaces = evaluadas.filter(c=>c.fue_eficaz===true).length;
  const pctEficacia = evaluadas.length > 0 ? Math.round((eficaces/evaluadas.length)*100) : 0;

  // Datos por mes
  const mesesData = MESES.map((mes, i) => {
    const programadas = caps.filter(c=>{
      if(!c.mes_programado) return false;
      const d = new Date(c.mes_programado);
      return d.getMonth()===i && d.getFullYear()===2026;
    });
    const ejec = programadas.filter(c=>c.estado==="Ejecutada");
    const pct = programadas.length > 0 ? Math.round((ejec.length/programadas.length)*100) : null;
    return { mes: mes.slice(0,3), programadas: programadas.length, ejecutadas: ejec.length, pct };
  });

  const maxBar = Math.max(...mesesData.map(m=>m.programadas), 1);

  if(fichaActiva) return <FichaIndicador tipo={fichaActiva} caps={caps} empresas={empresas} token={window.__aura_token||''} onClose={()=>setFichaActiva(null)}/>;

  return (
    <div className="page">
      <div className="page-header">
        <h2 style={{fontSize:"24px",fontWeight:"700"}}>Inicio</h2>
        <p style={{color:"var(--text2)",marginTop:"4px"}}>Plan de formación 2026</p>
      </div>

      {/* Tarjetas de resumen */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:"14px",marginBottom:"24px"}}>
        {[
          {num:total,label:"Total capacitaciones",color:"var(--text)"},
          {num:ejecutadas,label:"Ejecutadas",color:"#059669"},
          {num:enProceso,label:"En proceso",color:"#d97706"},
          {num:sinIniciar,label:"Sin iniciar",color:"#94a3b8"},
        ].map((s,i)=>(
          <div key={i} className="stat-card">
            <div className="stat-num" style={{color:s.color}}>{s.num}</div>
            <div className="stat-label">{s.label}</div>
          </div>
        ))}
      </div>

      {/* Indicadores principales */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px",marginBottom:"24px"}}>
        <div className="card" style={{padding:"20px",cursor:"pointer",transition:"transform 0.12s"}} onClick={()=>setFichaActiva("cumplimiento")} onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"} onMouseLeave={e=>e.currentTarget.style.transform="translateY(0)"}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}}>
            <div style={{fontSize:"11px",fontWeight:"600",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.06em"}}>% Cumplimiento acumulado {new Date().getFullYear()}</div>
            <span style={{fontSize:"10px",color:"var(--accent)",letterSpacing:"0.04em"}}>Ver ficha →</span>
          </div>
          <div style={{display:"flex",alignItems:"baseline",gap:"8px",marginBottom:"8px"}}>
            <span style={{fontFamily:"Fraunces,serif",fontSize:"40px",fontWeight:"700",color:pctCumplimiento>=80?"#c9a84c":pctCumplimiento>=50?"#d97706":"#dc2626"}}>{pctCumplimiento}%</span>
            <span style={{fontSize:"12px",color:"var(--text3)"}}>meta: 80%</span>
          </div>
          <div className="progress-bar-wrap" style={{marginBottom:"8px"}}><div className="progress-bar-fill" style={{width:`${Math.min(pctCumplimiento,100)}%`,background:pctCumplimiento>=80?"#c9a84c":pctCumplimiento>=50?"#d97706":"#dc2626"}}/></div>
          <div style={{fontSize:"12px",color:"var(--text2)"}}>
            {ejecutadas} ejecutadas de {conMesProg} programadas en el período
          </div>
          <div style={{fontSize:"11px",color:"var(--text3)",marginTop:"4px",fontStyle:"italic"}}>
            (Ejecutadas / Programadas en el período) × 100
          </div>
        </div>

        <div className="card" style={{padding:"20px",cursor:"pointer",transition:"transform 0.12s"}} onClick={()=>setFichaActiva("eficacia")} onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"} onMouseLeave={e=>e.currentTarget.style.transform="translateY(0)"}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}}>
            <div style={{fontSize:"11px",fontWeight:"600",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.06em"}}>% Eficacia de capacitaciones</div>
            <span style={{fontSize:"10px",color:"var(--accent)",letterSpacing:"0.04em"}}>Ver ficha →</span>
          </div>
          <div style={{display:"flex",alignItems:"baseline",gap:"8px",marginBottom:"8px"}}>
            <span style={{fontFamily:"Fraunces,serif",fontSize:"40px",fontWeight:"700",color:pctEficacia>=75?"#c9a84c":pctEficacia>=50?"#d97706":"#dc2626"}}>{evaluadas.length>0?pctEficacia+"%":"—"}</span>
            <span style={{fontSize:"12px",color:"var(--text3)"}}>meta: 75%</span>
          </div>
          {evaluadas.length>0 && <div className="progress-bar-wrap" style={{marginBottom:"8px"}}><div className="progress-bar-fill" style={{width:`${pctEficacia}%`,background:pctEficacia>=75?"#c9a84c":pctEficacia>=50?"#d97706":"#dc2626"}}/></div>}
          <div style={{fontSize:"12px",color:"var(--text2)"}}>
            {evaluadas.length>0 ? `${eficaces} eficaces de ${evaluadas.length} evaluadas` : "Aún no hay capacitaciones evaluadas"}
          </div>
          <div style={{fontSize:"11px",color:"var(--text3)",marginTop:"4px",fontStyle:"italic"}}>
            (Marcadas eficaz / Total evaluadas) × 100
          </div>
        </div>
      </div>

      {/* Cumplimiento mensual */}
      <div className="card" style={{padding:"24px",marginBottom:"20px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"20px",flexWrap:"wrap",gap:"10px"}}>
          <div>
            <div style={{fontSize:"12px",fontWeight:"600",color:"var(--text2)",textTransform:"uppercase",letterSpacing:"0.06em"}}>Cumplimiento mensual {new Date().getFullYear()}</div>
            <div style={{fontSize:"12px",color:"var(--text3)",marginTop:"2px"}}>Programadas vs ejecutadas · mes a mes</div>
          </div>

        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:"10px"}}>
          {mesesData.map((m,i)=>{
            if(i > new Date().getMonth()) return null;
            const pct = m.programadas > 0 ? Math.round((m.ejecutadas/m.programadas)*100) : null;
            const sinDatos = m.programadas === 0;
            const cumple = pct !== null && pct >= 80;
            const color = sinDatos ? "var(--text3)" : cumple ? "#c9a84c" : pct >= 50 ? "#d97706" : "#dc2626";
            const bg = sinDatos ? "var(--surface2)" : cumple ? "#fdf9f0" : pct >= 50 ? "#fffbeb" : "#fef2f2";
            const borderColor = sinDatos ? "var(--border)" : cumple ? "#c9a84c40" : pct >= 50 ? "#d9770640" : "#dc262640";
            const isCurrent = i === new Date().getMonth();
            return (
              <div key={i} style={{background:bg,borderRadius:"10px",padding:"14px 14px 12px",border:`1px solid ${borderColor}`,position:"relative"}}>
                {isCurrent && <div style={{position:"absolute",top:"8px",right:"8px",width:"6px",height:"6px",borderRadius:"50%",background:"#c9a84c"}}/>}
                <div style={{fontSize:"10px",fontWeight:"700",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"8px"}}>{MESES[i].slice(0,3)}</div>
                <div style={{fontFamily:"Fraunces,serif",fontSize:"24px",fontWeight:"700",color,lineHeight:"1",marginBottom:"6px"}}>
                  {sinDatos ? "—" : pct+"%"}
                </div>
                <div style={{fontSize:"10px",color:"var(--text2)",marginBottom:"8px"}}>
                  {sinDatos ? "Sin programación" : `${m.ejecutadas} de ${m.programadas}`}
                </div>
                <div style={{height:"3px",background:"rgba(0,0,0,0.06)",borderRadius:"2px",overflow:"hidden"}}>
                  <div style={{height:"100%",width:sinDatos?"0%":`${Math.min(pct,100)}%`,background:color,borderRadius:"2px",transition:"width 0.4s"}}/>
                </div>
                <div style={{marginTop:"8px"}}>
                  <span style={{fontSize:"10px",fontWeight:"600",color,padding:"2px 8px",background:"rgba(255,255,255,0.6)",borderRadius:"20px"}}>
                    {sinDatos ? "Sin datos" : cumple ? "✓ Cumple" : "✗ No cumple"}
                  </span>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Próximas capacitaciones - 2 meses */}
      {(()=>{
        const hoy = new Date();
        const mes1 = hoy.getMonth();
        const mes2 = (hoy.getMonth()+1)%12;
        const anio = hoy.getFullYear();
        const proximas = caps.filter(c=>{
          if(!c.mes_programado || c.estado==="Ejecutada") return false;
          const d = new Date(c.mes_programado);
          return d.getFullYear()===anio && (d.getMonth()===mes1 || d.getMonth()===mes2);
        }).sort((a,b)=>new Date(a.mes_programado)-new Date(b.mes_programado));
        if(proximas.length===0) return null;
        return (
          <div className="card" style={{marginBottom:"20px"}}>
            <div style={{padding:"16px 20px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:"12px",fontWeight:"600",color:"var(--text2)",textTransform:"uppercase",letterSpacing:"0.05em"}}>Próximas capacitaciones</div>
                <div style={{fontSize:"12px",color:"var(--text3)",marginTop:"2px"}}>{MESES[mes1]} y {MESES[mes2]} · {proximas.length} pendientes</div>
              </div>
              <button type="button" onClick={()=>{
                const lineas = proximas.map(c=>{
                  const emp = empresas.find(e=>e.id===c.empresa_id);
                  const d = new Date(c.mes_programado);
                  return `• ${MESES[d.getMonth()]} | ${c.nombre} | Responsable: ${c.responsable||"—"} | Dirigido a: ${c.dirigido_a||"—"} [${emp?.codigo||""}]`;
                }).join("\n");
                const texto = `Plan de Formación 2026 — Próximas capacitaciones\n\n${lineas}\n\nPor favor confirmar disponibilidad y coordinar la logística correspondiente.`;
                navigator.clipboard.writeText(texto).then(()=>alert("✓ Texto copiado al portapapeles. Pégalo en tu correo.")).catch(()=>alert(texto));
              }} style={{background:"#c9a84c",color:"#0d0d0d",border:"none",borderRadius:"8px",padding:"7px 14px",fontSize:"12px",fontWeight:"600",cursor:"pointer"}}>
                Copiar para correo
              </button>
            </div>
            <div className="table-wrap">
              <table>
                <thead><tr>
                  <th>Mes</th><th>Capacitación</th><th>Empresa</th><th>Responsable</th><th>Dirigido a</th><th>Estado</th>
                </tr></thead>
                <tbody>
                  {proximas.map(c=>{
                    const emp = empresas.find(e=>e.id===c.empresa_id);
                    const d = new Date(c.mes_programado);
                    return (
                      <tr key={c.id}>
                        <td style={{fontWeight:"600",color:"#c9a84c",whiteSpace:"nowrap"}}>{MESES[d.getMonth()].slice(0,3)}</td>
                        <td style={{maxWidth:"200px"}}>
                          <div style={{fontWeight:"500",fontSize:"13px",lineHeight:"1.3"}}>{c.nombre.length>55?c.nombre.slice(0,55)+"…":c.nombre}</div>
                          {c.componente && <div style={{fontSize:"11px",color:"var(--text3)",marginTop:"1px"}}>{c.componente.split("(")[0].trim()}</div>}
                        </td>
                        <td><span style={{fontSize:"11px",background:"#fdf8ec",color:"#6b4e1a",padding:"2px 7px",borderRadius:"20px",fontWeight:"600"}}>{emp?.codigo||"—"}</span></td>
                        <td style={{fontSize:"13px"}}>{c.responsable||"—"}</td>
                        <td style={{fontSize:"12px",color:"var(--text2)",maxWidth:"160px"}}>{c.dirigido_a?c.dirigido_a.slice(0,50)+(c.dirigido_a.length>50?"…":""):"—"}</td>
                        <td><span className="badge" style={{background:estadoBg[c.estado],color:estadoColor[c.estado]}}>{c.estado}</span></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      })()}
      {/* Tabla resumen por mes */}    </div>
  );
}
// ── FORMULARIO ──
function CapForm({ cap, empresas, token, onSave, onClose }) {
  const isNew = !cap?.id;
  const blank = {numero:"",empresa_id:empresas[0]?.id||"",nombre:"",objetivo:"",linea:"",componente:"",tipo_formacion:"",categoria:"Interna",dirigido_a:"",responsable:"",intensidad:"",estado:"Sin iniciar",porcentaje_avance:0,mes_programado:"",fecha_ejecucion:"",trabajadores_programados:"",trabajadores_asistieron:"",costo:0,fuente_recursos:[],seguimiento:"",eficacia_fecha:"",eficacia_metodo:"",eficacia_responsable:"",fue_eficaz:null};
  const [form, setForm] = useState(cap ? {...blank,...cap, fuente_recursos:cap.fuente_recursos||[], mes_programado:cap.mes_programado||"", fecha_ejecucion:cap.fecha_ejecucion||"", eficacia_fecha:cap.eficacia_fecha||""} : blank);
  const [evidencias, setEvidencias] = useState([]);
  const [existingEvid, setExistingEvid] = useState([]);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");

  useEffect(()=>{
    if(cap?.id) api(`evidencias?capacitacion_id=eq.${cap.id}&select=*`,"",token).then(r=>setExistingEvid(r||[])).catch(()=>{});
  },[cap?.id]);

  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const toggleFuente = f => { const arr=form.fuente_recursos||[]; set("fuente_recursos", arr.includes(f)?arr.filter(x=>x!==f):[...arr,f]); };

  const save = async () => {
    setErr(""); setLoading(true);
    try {
      if(!form.nombre.trim()) throw new Error("El nombre es obligatorio.");
      // Eficacia es opcional al ejecutar — se completa al cierre del mes
      const payload = {...form};
      if(!payload.mes_programado) payload.mes_programado=null;
      if(!payload.fecha_ejecucion) payload.fecha_ejecucion=null;
      if(!payload.eficacia_fecha) payload.eficacia_fecha=null;
      payload.updated_at = new Date().toISOString();

      let capId = cap?.id;
      if(isNew){
        const [created] = await api("capacitaciones",{method:"POST",body:JSON.stringify(payload)},token);
        capId = created.id;
      } else {
        await api(`capacitaciones?id=eq.${cap.id}`,{method:"PATCH",body:JSON.stringify(payload)},token);
      }

      for(const ev of evidencias){
        const path = `${capId}/${Date.now()}_${ev.file.name}`;
        const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/evidencias/${path}`,{
          method:"POST", headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${token}`,"Content-Type":ev.file.type}, body:ev.file
        });
        if(uploadRes.ok){
          const url = `${SUPABASE_URL}/storage/v1/object/evidencias/${path}`;
          await api("evidencias",{method:"POST",body:JSON.stringify({capacitacion_id:capId,tipo:ev.tipo,nombre_archivo:ev.file.name,url})},token);
        }
      }
      onSave();
    } catch(e){ setErr(e.message); }
    finally{ setLoading(false); }
  };

  const deleteEvid = async id => {
    if(!confirm("¿Eliminar esta evidencia?")) return;
    await api(`evidencias?id=eq.${id}`,{method:"DELETE",prefer:"return=minimal"},token);
    setExistingEvid(p=>p.filter(e=>e.id!==id));
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <h3 style={{fontSize:"18px",fontWeight:"700"}}>{isNew?"Nueva capacitación":"Editar capacitación"}</h3>
          <button onClick={onClose} style={{background:"none",color:"var(--text2)",padding:"4px"}}>{Ico.close}</button>
        </div>
        <div className="modal-body">
          {err && <div className="alert alert-err">{err}</div>}
          <div className="grid2">
            <div className="field"><label className="label">N°</label><input type="number" value={form.numero} onChange={e=>set("numero",e.target.value)} placeholder="Ej: 1"/></div>
            <div className="field"><label className="label">Empresa *</label>
              <select value={form.empresa_id} onChange={e=>set("empresa_id",e.target.value)}>
                {empresas.map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}
              </select>
            </div>
          </div>
          <div className="field"><label className="label">Nombre de la capacitación *</label><input value={form.nombre} onChange={e=>set("nombre",e.target.value)} placeholder="Ej: Riesgo químico"/></div>
          <div className="grid2">
            <div className="field"><label className="label">Línea</label>
              <select value={form.linea} onChange={e=>set("linea",e.target.value)}>
                <option value="">— Seleccionar —</option>
                {LINEAS.map(l=><option key={l} value={l}>{l.split(":")[0]}</option>)}
              </select>
            </div>
            <div className="field"><label className="label">Componente</label>
              <select value={form.componente} onChange={e=>set("componente",e.target.value)}>
                <option value="">— Seleccionar —</option>
                {COMPONENTES.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
          </div>
          <div className="grid3">
            <div className="field"><label className="label">Tipo de formación</label>
              <select value={form.tipo_formacion} onChange={e=>set("tipo_formacion",e.target.value)}>
                <option value="">— Seleccionar —</option>
                {TIPOS.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
            </div>
            <div className="field"><label className="label">Categoría</label>
              <select value={form.categoria} onChange={e=>set("categoria",e.target.value)}><option>Interna</option><option>Externa</option></select>
            </div>
            <div className="field"><label className="label">Intensidad (horas)</label><input value={form.intensidad} onChange={e=>set("intensidad",e.target.value)} placeholder="Ej: 8 horas"/></div>
          </div>
          <div className="grid2">
            <div className="field"><label className="label">Dirigido a</label><input value={form.dirigido_a} onChange={e=>set("dirigido_a",e.target.value)} placeholder="Ej: Todo el personal"/></div>
            <div className="field"><label className="label">Responsable</label><input value={form.responsable} onChange={e=>set("responsable",e.target.value)} placeholder="Nombre del responsable"/></div>
          </div>
          <div className="field"><label className="label">Objetivo (opcional)</label><textarea value={form.objetivo} onChange={e=>set("objetivo",e.target.value)} placeholder="Describe el objetivo…" rows={2}/></div>

          <div className="section-title">Cronograma y asistencia</div>
          <div className="grid3">
            <div className="field"><label className="label">Estado</label>
              <select value={form.estado} onChange={e=>set("estado",e.target.value)}>
                {ESTADOS.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            <div className="field"><label className="label">Mes programado</label><input type="date" value={form.mes_programado} onChange={e=>set("mes_programado",e.target.value)}/></div>
            <div className="field"><label className="label">Fecha de ejecución</label><input type="date" value={form.fecha_ejecucion} onChange={e=>set("fecha_ejecucion",e.target.value)}/></div>
          </div>
          <div className="grid2">
            <div className="field"><label className="label">Trabajadores programados</label><input type="number" value={form.trabajadores_programados} onChange={e=>set("trabajadores_programados",e.target.value)}/></div>
            <div className="field"><label className="label">Trabajadores que asistieron</label><input type="number" value={form.trabajadores_asistieron} onChange={e=>set("trabajadores_asistieron",e.target.value)}/></div>
          </div>
          <div className="field"><label className="label">Seguimiento / notas</label><textarea value={form.seguimiento} onChange={e=>set("seguimiento",e.target.value)} placeholder="Observaciones…" rows={2}/></div>

          <div className="section-title">Información financiera</div>
          <div className="grid2">
            <div className="field"><label className="label">Costo ($)</label><input type="number" value={form.costo} onChange={e=>set("costo",e.target.value)}/></div>
            <div className="field"><label className="label">Fuente de recursos</label>
              <div className="chip-group" style={{marginTop:"4px"}}>
                {FUENTES.map(f=><button key={f} type="button" className={`chip${(form.fuente_recursos||[]).includes(f)?" active":""}`} onClick={()=>toggleFuente(f)}>{f}</button>)}
              </div>
            </div>
          </div>

          {form.estado==="Ejecutada" && <>
            <div className="section-title">Eficacia <span style={{color:"var(--warn)"}}>*</span></div>
            {(!form.eficacia_fecha||!form.eficacia_metodo||!form.eficacia_responsable) && <div className="alert" style={{background:"#eff6ff",border:"1px solid #93c5fd",color:"#1e40af",fontSize:"13px",marginBottom:"14px"}}>Puedes completar la eficacia al cierre del mes. Mientras tanto la capacitación queda marcada como <strong>Eficacia pendiente</strong>.</div>}
            <div className="grid3">
              <div className="field"><label className="label">Fecha de verificación *</label><input type="date" value={form.eficacia_fecha} onChange={e=>set("eficacia_fecha",e.target.value)}/></div>
              <div className="field"><label className="label">Método de evaluación *</label><input value={form.eficacia_metodo} onChange={e=>set("eficacia_metodo",e.target.value)} placeholder="Ej: Evaluación de conocimientos"/></div>
              <div className="field"><label className="label">Responsable medición *</label><input value={form.eficacia_responsable} onChange={e=>set("eficacia_responsable",e.target.value)} placeholder="Nombre"/></div>
            </div>
            <div className="field" style={{marginTop:"8px"}}>
              <label style={{display:"flex",alignItems:"center",gap:"10px",cursor:"pointer",padding:"12px 16px",background:form.fue_eficaz?"#fdf8ec":"var(--surface2)",border:"1px solid",borderColor:form.fue_eficaz?"#c9a84c":"var(--border)",borderRadius:"var(--radius)",transition:"all 0.15s"}}>
                <input type="checkbox" checked={form.fue_eficaz===true} onChange={e=>set("fue_eficaz",e.target.checked?true:null)} style={{width:"18px",height:"18px",accentColor:"#2d5016",cursor:"pointer"}}/>
                <span style={{fontSize:"14px",fontWeight:"500",color:form.fue_eficaz?"#6b4e1a":"var(--text2)"}}>
                  {form.fue_eficaz ? "✓ Capacitación eficaz" : "¿Fue eficaz esta capacitación?"}
                </span>
              </label>
            </div>
          </>}

          <div className="section-title">Evidencias</div>
          {existingEvid.length>0 && <div style={{marginBottom:"12px"}}>
            <div style={{fontSize:"12px",color:"var(--text2)",marginBottom:"6px",fontWeight:"600"}}>Archivos cargados</div>
            {existingEvid.map(ev=>(
              <div key={ev.id} className="file-item">
                <span style={{display:"flex",alignItems:"center",gap:"6px"}}>{Ico.file} {ev.nombre_archivo} <span style={{fontSize:"11px",color:"var(--text3)"}}>({ev.tipo})</span></span>
                <div style={{display:"flex",gap:"10px",alignItems:"center"}}>
                  <a href={ev.url} target="_blank" rel="noreferrer" style={{fontSize:"12px",color:"var(--accent2)"}}>Ver</a>
                  <button type="button" onClick={()=>deleteEvid(ev.id)} style={{background:"none",color:"var(--danger)",padding:"0"}}>{Ico.trash}</button>
                </div>
              </div>
            ))}
          </div>}
          {TIPOS_EVIDENCIA.map(({key,label})=>{
            const pending = evidencias.find(e=>e.tipo===key);
            return (
              <div key={key} style={{marginBottom:"10px"}}>
                <label className="label">{label}</label>
                <label className="upload-zone">
                  <input type="file" style={{display:"none"}} onChange={e=>{ const f=e.target.files[0]; if(f) setEvidencias(p=>[...p.filter(x=>x.tipo!==key),{tipo:key,file:f}]); }} accept=".pdf,.png,.jpg,.jpeg,.pptx,.xlsx,.docx"/>
                  {pending
                    ? <div style={{fontSize:"13px",color:"var(--accent)"}}>{Ico.file} {pending.file.name}</div>
                    : <div style={{color:"var(--text3)",fontSize:"13px"}}>{Ico.upload}<br/>Haz clic para subir {label.toLowerCase()}</div>}
                </label>
              </div>
            );
          })}
        </div>
        <div className="modal-footer">
          <button type="button" className="btn-ghost" onClick={onClose}>Cancelar</button>
          <button type="button" className="btn-primary" onClick={save} disabled={loading}>{loading?"Guardando…":"Guardar"}</button>
        </div>
      </div>
    </div>
  );
}

// ── LISTADO ──
function Listado({ caps, empresas, token, onRefresh, isAdmin=true }) {
  const [search, setSearch] = useState("");
  const [filtEmp, setFiltEmp] = useState("");
  const [filtEst, setFiltEst] = useState("");
  const [sortCol, setSortCol] = useState("numero");
  const [sortDir, setSortDir] = useState("asc");
  const [editing, setEditing] = useState(null);
  const [creating, setCreating] = useState(false);
  const [evidCounts, setEvidCounts] = useState({});

  useEffect(()=>{
    const ejecutadas = caps.filter(c=>
      c.estado==="Ejecutada" && c.eficacia_fecha && c.eficacia_metodo && c.eficacia_responsable
    );
    if(ejecutadas.length === 0) { setEvidCounts({}); return; }
    const ids = ejecutadas.map(c=>`"${c.id}"`).join(',');
    fetch(`${SUPABASE_URL}/rest/v1/evidencias?capacitacion_id=in.(${ids})&select=capacitacion_id`, {
      headers:{ apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
    }).then(r=>r.json()).then(data=>{
      const counts = {};
      (data||[]).forEach(e=>{ counts[e.capacitacion_id]=(counts[e.capacitacion_id]||0)+1; });
      setEvidCounts(counts);
    }).catch(()=>{});
  },[caps]);

  const toggleSort = (col) => {
    if(sortCol === col) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortCol(col); setSortDir("asc"); }
  };

  const filtered = caps.filter(c=>{
    const s=search.toLowerCase();
    return (!s||c.nombre?.toLowerCase().includes(s)||c.responsable?.toLowerCase().includes(s))
      && (!filtEmp||c.empresa_id===filtEmp)
      && (!filtEst||c.estado===filtEst);
  }).sort((a,b)=>{
    let va, vb;
    if(sortCol==="numero") { va=a.numero||0; vb=b.numero||0; }
    else if(sortCol==="nombre") { va=(a.nombre||"").toLowerCase(); vb=(b.nombre||"").toLowerCase(); }
    else if(sortCol==="responsable") { va=(a.responsable||"").toLowerCase(); vb=(b.responsable||"").toLowerCase(); }
    else if(sortCol==="mes_programado") { va=a.mes_programado||""; vb=b.mes_programado||""; }
    else if(sortCol==="estado") { va=a.estado||""; vb=b.estado||""; }
    else { va=a[sortCol]||""; vb=b[sortCol]||""; }
    if(va < vb) return sortDir==="asc" ? -1 : 1;
    if(va > vb) return sortDir==="asc" ? 1 : -1;
    return 0;
  });

  const deleteOne = async id => {
    if(!confirm("¿Eliminar esta capacitación?")) return;
    await api(`capacitaciones?id=eq.${id}`,{method:"DELETE",prefer:"return=minimal"},token);
    onRefresh();
  };

  return (
    <div className="page">
      <div className="page-header" style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:"12px"}}>
        <div>
          <h2 style={{fontSize:"24px",fontWeight:"700"}}>Capacitaciones</h2>
          <p style={{color:"var(--text2)",marginTop:"4px"}}>{filtered.length} de {caps.length} registros</p>
        </div>
        {isAdmin && <button className="btn-primary" onClick={()=>setCreating(true)} style={{display:"flex",alignItems:"center",gap:"6px"}}>
          {Ico.plus} Nueva capacitación
        </button>}
      </div>
      <div style={{display:"flex",gap:"10px",flexWrap:"wrap",marginBottom:"20px"}}>
        <div className="search-wrap" style={{flex:"1",minWidth:"200px"}}>
          {Ico.search}
          <input placeholder="Buscar por nombre o responsable…" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <select value={filtEmp} onChange={e=>setFiltEmp(e.target.value)} style={{width:"auto",minWidth:"180px"}}>
          <option value="">Todas las empresas</option>
          {empresas.map(e=><option key={e.id} value={e.id}>{e.nombre.split(" ").slice(0,2).join(" ")}</option>)}
        </select>
        <select value={filtEst} onChange={e=>setFiltEst(e.target.value)} style={{width:"auto",minWidth:"150px"}}>
          <option value="">Todos los estados</option>
          {ESTADOS.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
      </div>
      <div className="card">
        {filtered.length===0
          ? <div className="empty-state">No se encontraron capacitaciones.</div>
          : <div className="table-wrap"><table>
            <thead><tr>
              {[
                    {label:"#", col:"numero"},
                    {label:"Nombre", col:"nombre"},
                    {label:"Empresa", col:null},
                    {label:"Responsable", col:"responsable"},
                    {label:"Programada", col:"mes_programado"},
                    {label:"Estado", col:"estado"},
                    {label:"Asistencia", col:null},
                    {label:"", col:null},
                  ].map((h,i)=>(
                    <th key={i} onClick={h.col?()=>toggleSort(h.col):undefined}
                      style={{cursor:h.col?"pointer":"default",userSelect:"none",whiteSpace:"nowrap",
                        color:sortCol===h.col?"var(--accent)":"var(--text3)",
                        fontSize:"11px",fontWeight:"600",textAlign:"left",padding:"10px 14px",
                        borderBottom:"1px solid var(--border)",textTransform:"uppercase",letterSpacing:"0.04em"}}>
                      {h.label}
                      {h.col && <span style={{marginLeft:"4px",opacity:sortCol===h.col?1:0.3}}>
                        {sortCol===h.col ? (sortDir==="asc" ? "↑" : "↓") : "↕"}
                      </span>}
                    </th>
                  ))}
            </tr></thead>
            <tbody>
              {filtered.map(c=>{
                const emp=empresas.find(e=>e.id===c.empresa_id);
                const d=c.mes_programado?new Date(c.mes_programado):null;
                const mes=d?`${MESES[d.getMonth()].slice(0,3)} ${d.getFullYear()}`:"—";
                const pct=c.trabajadores_programados>0?Math.round((c.trabajadores_asistieron/c.trabajadores_programados)*100):null;
                return (
                  <tr key={c.id}>
                    <td style={{color:"var(--text3)",fontWeight:"600"}}>{filtered.indexOf(c)+1}</td>
                    <td style={{maxWidth:"220px"}}>
                      <div style={{fontWeight:"500",lineHeight:"1.3"}}>{c.nombre.length>52?c.nombre.slice(0,52)+"…":c.nombre}</div>
                      {c.componente&&<div style={{fontSize:"11px",color:"var(--text3)",marginTop:"2px"}}>{c.componente.split("(")[0].trim()}</div>}
                    </td>
                    <td><span style={{fontSize:"12px",background:"#fdf8ec",color:"#6b4e1a",padding:"2px 8px",borderRadius:"20px",fontWeight:"600"}}>{emp?.codigo||"—"}</span></td>
                    <td style={{fontSize:"13px"}}>{c.responsable||"—"}</td>
                    <td style={{fontSize:"13px"}}>{mes}</td>
                    <td>
                        <span className="badge" style={{background:estadoBg[c.estado],color:estadoColor[c.estado]}}>{c.estado}</span>
                        {c.estado==="Ejecutada" && (()=>{
                          const faltaEficacia = !c.eficacia_fecha||!c.eficacia_metodo||!c.eficacia_responsable;
                          const eficaciaOk = !faltaEficacia;
                          const faltaEvid = eficaciaOk && !evidCounts[c.id];
                          if(!faltaEficacia && !faltaEvid) return null;
                          return (
                            <div style={{display:"flex",flexDirection:"column",gap:"3px",marginTop:"4px"}}>
                              {faltaEficacia && (
                                <span style={{fontSize:"10px",fontWeight:"500",color:"#1e40af",background:"#eff6ff",padding:"2px 7px",borderRadius:"4px",display:"inline-flex",alignItems:"center",gap:"3px",width:"fit-content"}}>
                                  <span>⏳</span> Eficacia pendiente
                                </span>
                              )}
                              {faltaEvid && (
                                <span style={{fontSize:"10px",fontWeight:"500",color:"#9a3412",background:"#fff7ed",padding:"2px 7px",borderRadius:"4px",display:"inline-flex",alignItems:"center",gap:"3px",width:"fit-content"}}>
                                  <span>📎</span> Evidencias pendientes
                                </span>
                              )}
                            </div>
                          );
                        })()}
                      </td>
                    <td style={{fontSize:"12px"}}>
                      {pct!==null?<div>
                        <div style={{fontWeight:"500"}}>{c.trabajadores_asistieron}/{c.trabajadores_programados}</div>
                        <div className="progress-bar-wrap" style={{marginTop:"4px",width:"56px"}}><div className="progress-bar-fill" style={{width:`${pct}%`}}/></div>
                      </div>:"—"}
                    </td>
                    <td>
                      <div style={{display:"flex",gap:"4px"}}>
                        <button type="button" onClick={()=>setEditing(c)} style={{background:"none",color:"var(--text2)",padding:"4px 6px",borderRadius:"6px"}}>{Ico.edit}</button>
                        {isAdmin && <button type="button" onClick={()=>deleteOne(c.id)} style={{background:"none",color:"var(--danger)",padding:"4px 6px",borderRadius:"6px"}}>{Ico.trash}</button>}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table></div>}
      </div>
      {(creating||editing) && <CapForm cap={editing} empresas={empresas} token={token} onSave={()=>{setCreating(false);setEditing(null);onRefresh();}} onClose={()=>{setCreating(false);setEditing(null);}}/>}
    </div>
  );
}

// ── EXPORT ──
function exportExcel(caps, empresas) {
  const rows = caps.map(c=>{
    const emp=empresas.find(e=>e.id===c.empresa_id);
    return {
      "#":c.numero,"Empresa":emp?.nombre||"","Estado":c.estado,"% Avance":c.porcentaje_avance,
      "Línea":c.linea,"Componente":c.componente,"Nombre":c.nombre,"Objetivo":c.objetivo,
      "Tipo":c.tipo_formacion,"Categoría":c.categoria,"Dirigido a":c.dirigido_a,
      "Responsable":c.responsable,"Intensidad":c.intensidad,
      "Mes programado":c.mes_programado,"Fecha ejecución":c.fecha_ejecucion,
      "Programados":c.trabajadores_programados,"Asistieron":c.trabajadores_asistieron,
      "Costo":c.costo,"Fuente":(c.fuente_recursos||[]).join(", "),
      "Eficacia - Fecha":c.eficacia_fecha,"Eficacia - Método":c.eficacia_metodo,
      "Eficacia - Responsable":c.eficacia_responsable,"Seguimiento":c.seguimiento,
    };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Plan Formación 2026");
  XLSX.writeFile(wb, `Plan_Formacion_2026_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ── EMPRESAS ──
function Empresas({ empresas, token, onRefresh }) {
  const [editing, setEditing] = React.useState(null);
  const [creating, setCreating] = React.useState(false);
  const [nombre, setNombre] = React.useState("");
  const [codigo, setCodigo] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [err, setErr] = React.useState("");

  const openEdit = (emp) => { setEditing(emp); setNombre(emp.nombre); setCodigo(emp.codigo||""); setErr(""); };
  const openCreate = () => { setCreating(true); setNombre(""); setCodigo(""); setErr(""); };
  const close = () => { setEditing(null); setCreating(false); setErr(""); };

  const save = async () => {
    if(!nombre.trim()) { setErr("El nombre es obligatorio."); return; }
    setLoading(true); setErr("");
    try {
      if(creating) {
        await api("empresas",{method:"POST",body:JSON.stringify({nombre:nombre.trim(),codigo:codigo.trim().toUpperCase()})},token);
      } else {
        await api(`empresas?id=eq.${editing.id}`,{method:"PATCH",body:JSON.stringify({nombre:nombre.trim(),codigo:codigo.trim().toUpperCase()})},token);
      }
      onRefresh(); close();
    } catch(e) { setErr(e.message); }
    finally { setLoading(false); }
  };

  return (
    <div className="page">
      <div className="page-header" style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"12px"}}>
        <div>
          <h2 style={{fontSize:"24px",fontWeight:"700"}}>Empresas</h2>
          <p style={{color:"var(--text2)",marginTop:"4px"}}>Administra las empresas del plan de formación</p>
        </div>
        <button className="btn-primary" onClick={openCreate} style={{display:"flex",alignItems:"center",gap:"6px"}}>{Ico.plus} Nueva empresa</button>
      </div>
      <div className="card">
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>
            <th>Nombre</th><th>Código</th><th>Acción</th>
          </tr></thead>
          <tbody>
            {empresas.map(emp=>(
              <tr key={emp.id}>
                <td style={{fontWeight:"500"}}>{emp.nombre}</td>
                <td><span style={{fontSize:"12px",background:"var(--accent-light)",color:"var(--accent)",padding:"2px 10px",borderRadius:"20px",fontWeight:"600"}}>{emp.codigo||"—"}</span></td>
                <td><button type="button" onClick={()=>openEdit(emp)} style={{background:"none",color:"var(--text2)",padding:"4px 8px",borderRadius:"6px",border:"1px solid var(--border)",fontSize:"13px",cursor:"pointer",display:"flex",alignItems:"center",gap:"5px"}}>{Ico.edit} Editar</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {(editing||creating) && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&close()}>
          <div className="modal" style={{maxWidth:"420px"}}>
            <div className="modal-header">
              <h3 style={{fontSize:"18px",fontWeight:"700"}}>{creating?"Nueva empresa":"Editar empresa"}</h3>
              <button onClick={close} style={{background:"none",color:"var(--text2)",padding:"4px"}}>{Ico.close}</button>
            </div>
            <div className="modal-body">
              {err && <div className="alert alert-err">{err}</div>}
              <div className="field"><label className="label">Nombre de la empresa *</label><input value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Ej: Química Orión SAS"/></div>
              <div className="field"><label className="label">Código (siglas)</label><input value={codigo} onChange={e=>setCodigo(e.target.value)} placeholder="Ej: QO" style={{textTransform:"uppercase"}}/></div>
            </div>
            <div className="modal-footer">
              <button className="btn-ghost" onClick={close}>Cancelar</button>
              <button className="btn-primary" onClick={save} disabled={loading}>{loading?"Guardando…":"Guardar"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
