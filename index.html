  return (
    <div style={{minHeight:"100vh",background:"var(--bg)",padding:"0"}}>
      <div style={{maxWidth:"900px",margin:"0 auto",padding:"40px 32px"}}>

        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:"48px"}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"4px"}}>
              <svg width="28" height="18" viewBox="0 0 52 38" fill="none">
                <path d="M4 34 A24 24 0 0 1 48 34" stroke="#1a1714" strokeWidth="1" strokeLinecap="round"/>
                <path d="M12 34 A16 16 0 0 1 40 34" stroke="#1a1714" strokeWidth="1" strokeLinecap="round"/>
                <circle cx="26" cy="34" r="2.5" fill="#1a1714"/>
              </svg>
              <span style={{fontFamily:"Fraunces,serif",fontWeight:"700",fontSize:"22px",letterSpacing:"-0.02em",color:"var(--text)"}}>Aura</span>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
            <div style={{fontSize:"12px",color:"var(--text2)",background:"var(--surface)",border:"0.5px solid var(--border)",borderRadius:"20px",padding:"5px 14px"}}>
              {isAdmin ? "Admin" : "Colaborador"}
            </div>
            <button type="button" onClick={onLogout} style={{background:"none",border:"0.5px solid var(--border)",borderRadius:"8px",padding:"5px 12px",fontSize:"12px",color:"var(--text3)",cursor:"pointer"}}>Salir</button>
          </div>
        </div>

        <div style={{marginBottom:"36px"}}>
          <h1 style={{fontFamily:"Fraunces,serif",fontSize:"32px",fontWeight:"700",color:"var(--text)",letterSpacing:"-0.02em"}}>{saludo}{nombre ? `, ${nombre}` : ""}.</h1>
          <p style={{fontSize:"14px",color:"var(--text2)",marginTop:"6px"}}>¿Con qué módulo vas a trabajar hoy?</p>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:"14px"}}>
          {modulos.map(m=>(
            <div key={m.id}
              onClick={()=>m.activo && m.acceso && onSelectModulo(m.id)}
              style={{
                background:"var(--surface)",
                border:m.activo?"0.5px solid #c9a84c":"0.5px solid var(--border)",
                borderRadius:"14px",
                padding:"22px 18px",
                cursor:m.activo && m.acceso?"pointer":"default",
                opacity:m.acceso?1:0.45,
                transition:"all 0.15s",
              }}
              onMouseEnter={e=>{ if(m.activo&&m.acceso) e.currentTarget.style.transform="translateY(-2px)"; }}
              onMouseLeave={e=>{ e.currentTarget.style.transform="translateY(0)"; }}
            >
              <div style={{width:"40px",height:"40px",borderRadius:"10px",background:m.activo?"#fdf9f0":"var(--surface2)",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:"14px"}}>
                {m.icon}
              </div>
              <div style={{fontSize:"14px",fontWeight:"600",color:"var(--text)",marginBottom:"4px"}}>{m.nombre}</div>
              <div style={{fontSize:"12px",color:"var(--text2)",lineHeight:"1.5",marginBottom:"10px"}}>{m.desc}</div>
              <span style={{
                display:"inline-block",fontSize:"10px",fontWeight:"600",
                padding:"2px 10px",borderRadius:"20px",letterSpacing:"0.04em",
                background:m.activo?"#fdf9f0":"var(--surface2)",
                color:m.activo?"#a8893a":"var(--text3)"
              }}>{m.activo?"Activo":"Próximamente"}</span>
            </div>
          ))}
        </div>

      </div>
    </div>
  );
}

// ── APP ──
function App() {
  const [token, setToken] = useState(()=>localStorage.getItem("gh_token")||"");
  const [rol, setRol] = useState(()=>localStorage.getItem("gh_rol")||"");
  const [userId, setUserId] = useState(()=>localStorage.getItem("gh_uid")||"");
  const [moduloActivo, setModuloActivo] = useState("");
  const [page, setPage] = useState("dashboard");
  const [fichaActiva, setFichaActiva] = useState(null);
  const [caps, setCaps] = useState([]);
  const [empresas, setEmpresas] = useState([]);
  const [filtroEmpresa, setFiltroEmpresa] = useState("");
  const [loading, setLoading] = useState(false);

  const isAdmin = rol === "admin";

  const login = async (tok, user) => {
    localStorage.setItem("gh_token", tok);
    localStorage.setItem("gh_uid", user.id);
    setToken(tok);
    setUserId(user.id);
    const perfil = await fetchPerfil(user.id, tok);
    localStorage.setItem("gh_rol", perfil.rol);
    setRol(perfil.rol);
  };
  const logout = () => {
    localStorage.removeItem("gh_token");
    localStorage.removeItem("gh_rol");
    localStorage.removeItem("gh_uid");
    setToken(""); setRol(""); setUserId(""); setCaps([]); setEmpresas([]);
    setModuloActivo("");
  };

  useEffect(()=>{ if(token) window.__aura_token = token; },[token]);

  const loadData = async () => {
    setLoading(true);
    try {
      const [emps, capList] = await Promise.all([
        api("empresas?select=*&order=nombre","",token),
        api("capacitaciones?select=*&order=numero","",token),
      ]);
      setEmpresas(emps||[]);
      setCaps(capList||[]);
    } catch(e){ console.error(e); }
    finally{ setLoading(false); }
  };

  useEffect(()=>{ if(token) loadData(); },[token]);

  if(!token) return <Login onLogin={login}/>;
  if(!moduloActivo) return <ModulosHome isAdmin={isAdmin} onSelectModulo={setModuloActivo} onLogout={logout} userName={isAdmin?"Mariale":""}/>;

  const filteredCaps = filtroEmpresa ? caps.filter(c=>c.empresa_id===filtroEmpresa) : caps;

  return (
    <div className="app-layout">
      <div className="sidebar">
        <div style={{padding:"20px 16px 12px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"20px"}}>
            <div style={{width:"34px",height:"34px",background:"#c9a84c",borderRadius:"9px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <svg width="20" height="14" viewBox="0 0 52 38" fill="none"><path d="M4 34 A24 24 0 0 1 48 34" stroke="white" strokeWidth="1.2" strokeLinecap="round"/><path d="M12 34 A16 16 0 0 1 40 34" stroke="white" strokeWidth="1.2" strokeLinecap="round"/><circle cx="26" cy="34" r="2.5" fill="white"/></svg>
            </div>
            <div>
              <div style={{fontFamily:"Fraunces,serif",fontWeight:"700",fontSize:"20px",lineHeight:"1.1",letterSpacing:"-0.02em",color:"#1a1714"}}>Aura</div>
              <div style={{fontSize:"9px",color:"var(--accent)",letterSpacing:"0.1em",textTransform:"uppercase",marginTop:"3px",fontWeight:"600"}}>{isAdmin?"Admin":"Colaborador"}</div>
            </div>
          </div>
          <div style={{marginBottom:"16px"}}>
            <div style={{fontSize:"10px",color:"#9e9890",fontWeight:"600",marginBottom:"6px",textTransform:"uppercase",letterSpacing:"0.08em",paddingLeft:"4px"}}>Empresa</div>
            <select value={filtroEmpresa} onChange={e=>setFiltroEmpresa(e.target.value)} style={{fontSize:"13px",padding:"7px 10px",background:"#ffffff",color:"#4a4540",border:"1px solid #e8e0d0",borderRadius:"8px"}}>
              <option value="">Todas</option>
              {empresas.map(e=><option key={e.id} value={e.id}>{e.nombre.split(" ").slice(0,2).join(" ")}</option>)}
            </select>
          </div>
        </div>
        <nav style={{flex:1,padding:"0 8px"}}>
          <div style={{fontSize:"10px",color:"#9e9890",fontWeight:"600",marginBottom:"6px",textTransform:"uppercase",letterSpacing:"0.08em",paddingLeft:"8px"}}>Menú</div>
          {[{id:"dashboard",label:"Inicio",icon:Ico.home},{id:"listado",label:"Capacitaciones",icon:Ico.list},...(isAdmin?[{id:"empresas",label:"Empresas",icon:Ico.building}]:[])].map(item=>(
            <button key={item.id} type="button" className={`nav-item${page===item.id?" active":""}`} onClick={()=>{ setPage(item.id); setFichaActiva(null); }}>
              {item.icon} {item.label}
            </button>
          ))}
        </nav>
        <div style={{padding:"12px 8px",borderTop:"1px solid #e8e0d0"}}>
          <button type="button" onClick={()=>exportExcel(filteredCaps,empresas)} className="nav-item" style={{width:"100%"}}>
            {Ico.download} Exportar Excel
          </button>
          <button type="button" onClick={()=>{ setModuloActivo(""); setFichaActiva(null); }} className="nav-item" style={{width:"100%"}}>
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M3 12h18M3 12l6-6M3 12l6 6"/></svg> Módulos
          </button>
          <button type="button" onClick={logout} className="nav-item" style={{width:"100%",color:"var(--danger)"}}>
            {Ico.logout} Cerrar sesión
          </button>
        </div>
      </div>
      <div className="main">
        {loading
          ? <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"60vh",color:"var(--text3)"}}>Cargando datos…</div>
          : page==="dashboard"
            ? <Dashboard caps={filteredCaps} empresas={empresas} fichaActiva={fichaActiva} setFichaActiva={setFichaActiva}/>
            : page==="empresas" && isAdmin
              ? <Empresas empresas={empresas} token={token} onRefresh={loadData}/>
              : <Listado caps={filteredCaps} empresas={empresas} token={token} onRefresh={loadData} isAdmin={isAdmin}/>
        }
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
